<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EconVenture — Founder</title>
<style>
  :root{
    --bg:#0a1626;--bg2:#0d1f38;--panel:#12294a;--panel2:#16315a;
    --line:#1f3a64;--line2:#2a4f86;--ink:#e9f0fa;--muted:#8da6c8;--faint:#5f7aa0;
    --gold:#e0b54a;--gold-dim:#b8923a;--good:#37b27e;--bad:#e5594d;--warn:#e0a23a;--info:#5b9bd5;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;--sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1100px 560px at 50% -8%,#0f213b 0%,var(--bg) 62%);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.55;min-height:100vh}
  h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em}
  .mono{font-family:var(--mono)}.muted{color:var(--muted)}.faint{color:var(--faint)}.good{color:var(--good)}.bad{color:var(--bad)}.gold{color:var(--gold)}
  header{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:16px;padding:11px 20px;background:rgba(8,18,33,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:baseline;gap:9px}.brand b{font-size:15px}.brand .tag{font-family:var(--mono);font-size:11px;color:var(--gold);border:1px solid var(--gold-dim);border-radius:4px;padding:1px 6px}
  .stat{display:flex;gap:18px;margin-left:auto}
  .st{display:flex;flex-direction:column;line-height:1.12}.st .v{font-family:var(--mono);font-size:13.5px}.st .l{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint)}

  main{max-width:1080px;margin:0 auto;padding:24px 20px 90px}
  .layout{display:grid;grid-template-columns:230px 1fr;gap:22px}
  @media(max-width:840px){.layout{grid-template-columns:1fr}.rail{display:none}}

  /* campaign rail */
  .rail{position:sticky;top:78px;align-self:start}
  .act{margin-bottom:16px}
  .act .ah{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
  .node{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:12.5px;color:var(--faint)}
  .node .dot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--line2);flex:none}
  .node.done{color:var(--muted)}.node.done .dot{background:var(--good);border-color:var(--good)}
  .node.active{color:var(--ink);font-weight:600}.node.active .dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 4px rgba(224,181,74,.15)}
  .node.locked .dot{background:transparent}

  .panel{background:linear-gradient(180deg,var(--panel) 0%,var(--bg2) 100%);border:1px solid var(--line);border-radius:13px;padding:22px 24px;margin-bottom:16px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
  .situation{font-size:15px;line-height:1.6;color:var(--ink)}
  .situation .speak{border-left:2px solid var(--gold-dim);padding:2px 0 2px 14px;margin:14px 0;color:var(--muted);font-style:italic}
  .prompt{font-size:15px;font-weight:600;margin:18px 0 4px}
  .hint{font-size:12px;color:var(--faint)}

  .opts{display:flex;flex-direction:column;gap:11px;margin-top:14px}
  .opt{border:1px solid var(--line);border-radius:11px;padding:14px 16px;cursor:pointer;transition:.12s;background:#0f2342}
  .opt:hover{border-color:var(--line2)}
  .opt.sel{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
  .opt .lab{font-size:14px;font-weight:600;margin-bottom:3px}
  .opt .det{font-size:12.5px;color:var(--muted)}
  .opt .pay{font-family:var(--mono);font-size:12px;color:var(--gold);margin-top:8px;border-top:1px solid var(--line);padding-top:8px}

  button{font-family:var(--sans);font-size:13.5px;font-weight:600;cursor:pointer;border-radius:8px;padding:11px 18px;border:1px solid var(--line2);background:#13294a;color:var(--ink);transition:.12s}
  button:hover{background:#173258}button.primary{background:linear-gradient(180deg,var(--gold),var(--gold-dim));color:#1a1205;border:none}button.primary:hover{filter:brightness(1.07)}button.ghost{background:transparent}button:disabled{opacity:.4;cursor:not-allowed}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.right{margin-left:auto}

  /* result + reinforcement */
  .payoff{border:1px solid var(--line2);border-radius:11px;padding:15px 17px;margin-top:8px;background:#0f2747}
  .payoff .h{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-bottom:6px}
  .payoff .fb{font-size:13.5px;color:var(--ink)}
  .reinforce{border:1px solid var(--gold-dim);border-radius:11px;padding:16px 18px;margin-top:13px;background:linear-gradient(180deg,#1a2a18 0%,#13251a 100%)}
  .reinforce .tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
  .reinforce h3{font-size:15px;margin-bottom:7px}
  .reinforce p{font-size:13px;color:#d7e2d9;margin:0 0 8px}
  .reinforce .key{font-size:12.5px;color:var(--gold);font-weight:600}
  .toolkit{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
  .chip{font-size:11px;border:1px solid var(--gold-dim);color:var(--gold);border-radius:20px;padding:3px 10px}

  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px}
  th,td{text-align:right;padding:7px 9px;border-bottom:1px solid var(--line)}th:first-child,td:first-child{text-align:left}
  th{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}td.mono{font-family:var(--mono)}
  .working{font-family:var(--mono);font-size:11.5px;color:var(--muted);background:#0b1c34;border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin-top:10px;line-height:1.75}
  .working .wh{font-family:var(--sans);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:6px}
  .working .wl{display:block}
  .working b{color:var(--gold);font-weight:600}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#16315a;border:1px solid var(--line2);border-radius:9px;padding:11px 18px;font-size:13px;z-index:50;opacity:0;pointer-events:none;transition:.2s}.toast.on{opacity:1}

  /* onboarding + quiz + report */
  .fld{display:flex;flex-direction:column;gap:5px}
  .fld span{font-size:12px;color:var(--muted)}
  .fld input{background:#0f2342;border:1px solid var(--line2);border-radius:8px;padding:12px 13px;color:var(--ink);font-size:15px;font-family:var(--sans);width:100%}
  .fld input:focus{outline:none;border-color:var(--gold)}
  .qprog{height:5px;background:#0f2342;border-radius:3px;overflow:hidden;margin-bottom:14px}
  .qprog>div{height:100%;background:var(--gold);transition:.25s}
  .scorebar{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0}
  .scorebox{flex:1;min-width:120px;border:1px solid var(--line2);border-radius:10px;padding:12px 14px;background:#0f2342;text-align:center}
  .scorebox .n{font-family:var(--mono);font-size:22px;font-weight:700}.scorebox .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .codebox{font-family:var(--mono);font-size:14px;color:var(--gold);background:#0b1c34;border:1px dashed var(--gold-dim);border-radius:9px;padding:12px 14px;margin:10px 0;word-break:break-all;text-align:center}

  /* device compatibility: phones, tablets, Chromebooks */
  @media(max-width:560px){
    header{padding:9px 13px;gap:10px}
    .brand b{font-size:14px}
    .stat{gap:10px}.st .v{font-size:11.5px}.st .l{font-size:8px}
    main{padding:16px 12px 80px}
    .panel{padding:16px 15px}
    h2{font-size:18px}
    .situation,.prompt{font-size:14px}
    .readout{grid-template-columns:1fr 1fr !important}
    .tablewrap{overflow-x:auto}
    .row{gap:8px}.row button{flex:1 1 auto}
    .working{font-size:10.8px}
  }
  @media(max-width:380px){ .stat .st:nth-child(2){display:none} } /* drop hurdle on the narrowest phones */

  /* =====================================================================
     BUILD 9 VISUAL LAYER — appended so the working stylesheet is untouched.
     Identity: a market terminal drawn on blueprint navy. Motion is tied to
     the economics (curves draw in, the equilibrium point glows, numbers
     count up), not decorative. Zero external dependencies. Reduced motion
     and keyboard focus honoured at the bottom.
     ===================================================================== */

  :root{
    --bg:#081321;--bg2:#0c1d34;--panel:#102647;--panel2:#153059;
    --line:#213f6b;--line2:#2e568f;--ink:#eaf1fb;--muted:#93abcd;--faint:#647fa6;
    --gold:#e7bd54;--gold-dim:#b8923a;--gold-soft:rgba(231,189,84,.14);
    --good:#3ec08a;--bad:#ec6154;--warn:#e0a23a;--info:#5fa0dd;
    --grid:rgba(120,160,215,.10);
    --shadow:0 18px 44px -22px rgba(0,0,0,.75),0 3px 10px -4px rgba(0,0,0,.5);
    --shadow-sm:0 8px 22px -14px rgba(0,0,0,.7);
    --ease:cubic-bezier(.22,.7,.2,1);
  }
  body{
    background:
      radial-gradient(1200px 620px at 50% -12%, #123055 0%, rgba(18,48,85,0) 60%),
      linear-gradient(180deg,#0a1727 0%, var(--bg) 55%);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  }
  /* faint blueprint grid, ambient and cheap */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:52px 52px;-webkit-mask-image:radial-gradient(1000px 700px at 50% 0%,#000 0%,transparent 78%);
            mask-image:radial-gradient(1000px 700px at 50% 0%,#000 0%,transparent 78%);opacity:.5;
  }
  header,main{position:relative;z-index:1}
  .mono,.st .v,.opt .pay,.working,.codebox,td.mono,.ro .v,.lever .val,th,.eyebrow,.act .ah{font-variant-numeric:tabular-nums}

  header{background:linear-gradient(180deg,rgba(8,16,28,.94),rgba(8,16,28,.72));border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(120,160,215,.05)}
  .brand b{letter-spacing:-.015em}
  .brand .tag{position:relative;padding-left:16px;background:var(--gold-soft);border-color:var(--gold-dim)}
  .brand .tag::before{content:"";position:absolute;left:6px;top:50%;width:5px;height:5px;border-radius:50%;background:var(--gold);transform:translateY(-50%);box-shadow:0 0 0 0 rgba(231,189,84,.6);animation:tick 2.4s var(--ease) infinite}
  .st .v{font-size:14px;letter-spacing:.2px}
  .st .l{color:var(--faint)}

  /* rail: a live campaign spine */
  .act .ah{color:var(--gold)}
  .node{transition:color .2s var(--ease)}
  .node .dot{transition:background .25s var(--ease),border-color .25s var(--ease),box-shadow .25s var(--ease),transform .25s var(--ease)}
  .node.done .dot{box-shadow:0 0 10px -1px rgba(62,192,138,.55)}
  .node.active{color:var(--ink)}
  .node.active .dot{transform:scale(1.15);animation:breathe 2.6s var(--ease) infinite}

  /* panels: layered glass with a top hairline of light */
  .panel{
    background:
      linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,0) 30%),
      linear-gradient(180deg,var(--panel) 0%,var(--bg2) 100%);
    border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
    animation:panelIn .5s var(--ease) both;
  }
  .panel::before{content:"";position:absolute;left:16px;right:16px;top:0;height:1px;background:linear-gradient(90deg,transparent,rgba(160,195,245,.25),transparent);border-radius:16px}
  .panel{position:relative;overflow:hidden}
  h2{letter-spacing:-.02em}
  .eyebrow{color:var(--gold)}

  /* decision cards: lift, gold rail on hover, spring select, staggered entrance */
  .opts .opt{position:relative;background:linear-gradient(180deg,#112a4d,#0e2342);border-color:var(--line);box-shadow:var(--shadow-sm);
    transition:transform .16s var(--ease),border-color .16s var(--ease),box-shadow .16s var(--ease),background .16s var(--ease);
    animation:cardIn .42s var(--ease) both}
  .opts .opt::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:3px;background:var(--gold);opacity:0;transform:scaleY(.4);transition:opacity .16s var(--ease),transform .16s var(--ease)}
  .opts .opt:hover{transform:translateY(-2px);border-color:var(--line2);box-shadow:0 16px 30px -18px rgba(0,0,0,.8)}
  .opts .opt:hover::before{opacity:.6;transform:scaleY(1)}
  .opts .opt.sel{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset,0 14px 30px -16px rgba(231,189,84,.35);transform:translateY(-2px);animation:pick .3s var(--ease)}
  .opts .opt.sel::before{opacity:1;transform:scaleY(1);box-shadow:0 0 12px rgba(231,189,84,.6)}
  .opts .opt:nth-child(1){animation-delay:.03s}.opts .opt:nth-child(2){animation-delay:.09s}.opts .opt:nth-child(3){animation-delay:.15s}.opts .opt:nth-child(4){animation-delay:.21s}.opts .opt:nth-child(5){animation-delay:.27s}
  .opt .pay{border-top-color:var(--line2)}

  /* buttons: quieter default, confident primary, real press + focus ring */
  button{border-radius:10px;transition:transform .12s var(--ease),background .16s var(--ease),filter .16s var(--ease),box-shadow .16s var(--ease)}
  button:hover{transform:translateY(-1px)}
  button:active{transform:translateY(0) scale(.985)}
  button.primary{background:linear-gradient(180deg,#f0c860,#c99a37);box-shadow:0 10px 24px -12px rgba(231,189,84,.6),inset 0 1px 0 rgba(255,255,255,.35);color:#1c1305}
  button.primary:hover{filter:brightness(1.05)}
  button.primary:disabled{filter:saturate(.5) brightness(.8)}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:8px}

  /* the interactive widget: the signature. A terminal readout with a live chart. */
  .lever{margin-top:8px}
  .lever .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .lever .name{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}
  .lever .val{font-family:var(--mono);font-size:19px;font-weight:650;color:var(--gold);letter-spacing:.3px;text-shadow:0 0 18px rgba(231,189,84,.28)}
  .readout{display:grid;gap:9px;margin-top:12px}
  .ro{background:linear-gradient(180deg,#0d2140,#0a1c37);border:1px solid var(--line);border-radius:10px;padding:9px 11px;text-align:center;transition:border-color .2s var(--ease)}
  .ro .l{font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin-bottom:3px}
  .ro .v{font-family:var(--mono);font-weight:600;color:var(--ink);letter-spacing:.2px}

  /* the chart frame reads like a market panel */
  #ivis,#rprev{position:relative}
  #ivis svg,#rvis svg{display:block;width:100%;height:auto;overflow:visible}
  #ivis svg .grid,#ivis svg line[stroke]{shape-rendering:crispEdges}
  #ivis svg circle{filter:drop-shadow(0 0 5px currentColor)}
  #ivis svg text{font-variant-numeric:tabular-nums}
  #ivis svg polygon,#ivis svg path[fill]:not([fill="none"]){transition:opacity .2s var(--ease)}
  #ivis svg.chartIn{animation:chartIn .55s var(--ease) both}
  #ivis svg.chartIn polyline,#ivis svg.chartIn path[fill="none"]{stroke-dasharray:1400;stroke-dashoffset:1400;animation:draw 1s var(--ease) .06s forwards}

  /* the live market panel container (interactive + run) */
  .panel [style*="background:#0f2342"]{border-color:var(--line)!important;background:
     radial-gradient(140% 120% at 0% 0%,rgba(95,160,221,.06),transparent 55%),linear-gradient(180deg,#0e2340,#0b1d38)!important;
     box-shadow:inset 0 1px 0 rgba(160,195,245,.06),var(--shadow-sm)}

  /* reward blocks: retune the reinforce off green onto gold-navy */
  .payoff{background:linear-gradient(180deg,#102a4c,#0c2140);border-color:var(--line2);box-shadow:var(--shadow-sm);animation:reveal .45s var(--ease) both}
  .payoff .h{color:var(--gold)}
  .reinforce{background:linear-gradient(180deg,rgba(231,189,84,.10),rgba(231,189,84,.03))!important;border-color:var(--gold-dim)!important;box-shadow:var(--shadow-sm);animation:reveal .5s var(--ease) .05s both}
  .reinforce p{color:#e7eefb!important}
  .chip{background:var(--gold-soft);transition:transform .15s var(--ease)}
  .chip:hover{transform:translateY(-1px)}

  /* range slider: gold control, glowing, cross-browser */
  input[type=range]{-webkit-appearance:none;appearance:none;height:26px;background:transparent;cursor:pointer}
  input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:6px;background:linear-gradient(90deg,var(--gold-dim),var(--line2));border:1px solid var(--line)}
  input[type=range]::-moz-range-track{height:6px;border-radius:6px;background:linear-gradient(90deg,var(--gold-dim),var(--line2));border:1px solid var(--line)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;margin-top:-8px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe6a0,var(--gold));border:2px solid #7a5f1f;box-shadow:0 0 0 4px rgba(231,189,84,.18),0 4px 10px -3px rgba(0,0,0,.6);transition:box-shadow .15s var(--ease)}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe6a0,var(--gold));border:2px solid #7a5f1f;box-shadow:0 0 0 4px rgba(231,189,84,.18)}
  input[type=range]:hover::-webkit-slider-thumb{box-shadow:0 0 0 6px rgba(231,189,84,.22),0 4px 12px -3px rgba(0,0,0,.65)}
  input[type=range]:active::-webkit-slider-thumb{box-shadow:0 0 0 8px rgba(231,189,84,.26)}

  /* tables + working read like a ledger */
  table{border:1px solid var(--line);border-radius:10px;overflow:hidden}
  tbody tr{transition:background .15s var(--ease)}
  tbody tr:hover{background:rgba(95,160,221,.05)}
  .working{background:linear-gradient(180deg,#0a1b33,#081627);box-shadow:inset 0 1px 0 rgba(160,195,245,.04)}
  .scorebox{background:linear-gradient(180deg,#0e2340,#0b1d38);box-shadow:var(--shadow-sm)}
  .scorebox .n{text-shadow:0 0 22px rgba(231,189,84,.25)}
  .fld input{transition:border-color .15s var(--ease),box-shadow .15s var(--ease)}
  .fld input:focus{box-shadow:0 0 0 3px rgba(231,189,84,.16)}
  .qprog{height:6px;background:#0e2340}
  .qprog>div{background:linear-gradient(90deg,var(--gold-dim),var(--gold));box-shadow:0 0 12px rgba(231,189,84,.4);transition:width .35s var(--ease)}
  .codebox{background:linear-gradient(180deg,#0a1b33,#081627)}
  .toast{background:linear-gradient(180deg,#173259,#122844);box-shadow:var(--shadow)}

  /* ---- motion keyframes ---- */
  @keyframes panelIn{from{opacity:0;transform:translateY(10px) scale(.994)}to{opacity:1;transform:none}}
  @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes pick{0%{transform:translateY(-2px) scale(1)}45%{transform:translateY(-2px) scale(1.012)}100%{transform:translateY(-2px) scale(1)}}
  @keyframes reveal{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes chartIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes breathe{0%,100%{box-shadow:0 0 0 4px rgba(231,189,84,.16)}50%{box-shadow:0 0 0 7px rgba(231,189,84,.05)}}
  @keyframes tick{0%{box-shadow:0 0 0 0 rgba(231,189,84,.55)}70%{box-shadow:0 0 0 7px rgba(231,189,84,0)}100%{box-shadow:0 0 0 0 rgba(231,189,84,0)}}
  @keyframes flash{0%{color:var(--gold)}100%{color:inherit}}
  .flash{animation:flash .6s var(--ease)}

  /* ---- quality floor: respect reduced motion ---- */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
    body::before{opacity:.32}
    .node.active .dot,.brand .tag::before{animation:none}
  }
</style>
</head>
<body>
<header>
  <div class="brand"><b>EconVenture</b><span class="tag">FOUNDER</span></div>
  <div class="stat" id="stat"></div>
</header>
<main>
  <div class="layout">
    <aside class="rail" id="rail"></aside>
    <section id="stage"></section>
  </div>
</main>
<div class="toast" id="toast"></div>

<!-- ECON ENGINE (embedded, used from Act 4 onward) -->
<!-- ENGINE (embedded) -->
<script>
(function (root) {
  'use strict';
  const START_CAPITAL=1000000,MKT_COST=12000,HOLDING_RATE=0.25;
  const START_CAPACITY=11000,START_FC=100000,START_VC=95;
  const MACRO=[{tag:'OPENING',type:'neutral',demand:1.00,cost:1.00,rate:0.10},
    {tag:'UPSWING',type:'positive',demand:1.12,cost:0.98,rate:0.09},
    {tag:'RATE HIKE',type:'negative',demand:0.93,cost:1.04,rate:0.15},
    {tag:'RECESSION',type:'crisis',demand:0.80,cost:1.04,rate:0.08},
    {tag:'MATURITY',type:'neutral',demand:0.99,cost:1.02,rate:0.10}];
  const macroOf=q=>MACRO[Math.min(Math.max(q,1)-1,MACRO.length-1)];
  const STRUCTURES={
    perfect:{label:'Perfect competition',bP:6,bQ:0,bM:0,Pref:110,M:70000,firms:8},
    monopolistic:{label:'Monopolistic competition',bP:4.5,bQ:1.0,bM:0.7,Pref:110,M:80000,firms:8},
    oligopoly:{label:'Oligopoly',bP:3,bQ:1.2,bM:0.8,Pref:150,M:30000,firms:5},
    duopoly:{label:'Duopoly',bP:2.5,bQ:1.2,bM:0.7,Pref:240,M:20000,firms:2}};
  const structOf=key=>STRUCTURES[key]||STRUCTURES.oligopoly;
  function unitVC(f,m){const a=(f.auto||0)*0.05;const r=Math.min(0.20,(f.rnd_stock||0)/600000*0.20);return f.vc*m.cost*Math.max(0.5,1-a-r);}
  function costs(f,m,on){let fc=f.fc*(1+(m.cost-1)*0.4);if(f.objective==='expense')fc*=1.20;const vcU=unitVC(f,m);const cap=f.capacity||11000;const q=on?f.production:null;const mc=vcU*(q!==null&&q>cap*0.9?1+(q/cap-0.9)*0.8:1);return{fc,vcU,cap,mc};}
  function shares(firms,structure,m,det){const S=structOf(structure);
    const U=firms.map(f=>{const up=-S.bP*((f.price-S.Pref)/S.Pref);const uq=S.bQ*(((f.quality||5)-5)/5);const um=S.bM*(((f.marketing||5)-5)/5);const sh=(!det&&f.is_bot)?(Math.random()-0.5)*0.08:0;return{id:f.id,u:Math.max(-30,Math.min(30,up+uq+um+sh))};});
    const ex=U.map(x=>({id:x.id,e:Math.exp(x.u)}));const sF=ex.reduce((s,x)=>s+x.e,0);const den=1+sF;const M=S.M*m.demand;
    return ex.map(x=>({id:x.id,share:sF>0?x.e/sF:0,demand:Math.round(M*x.e/den)}));}
  function firmResult(f,m,on,dq){const c=costs(f,m,on);const produced=on?f.production:dq;const sold=Math.min(dq,produced);const unsold=Math.max(0,produced-sold);
    const revenue=f.price*sold;const varCost=c.vcU*produced;const overtime=(on&&f.production>c.cap)?c.vcU*(f.production-c.cap)*0.6:0;const holding=unsold*c.vcU*HOLDING_RATE;
    const mktCost=(f.marketing||0)*MKT_COST+(f.objective==='expense'?40000:0);const autoCost=(f.auto||0)*6000;const rndCost=f.rnd||0;const capex=(f.capacity_buy||0)*200;
    const total=c.fc+varCost+overtime+holding+mktCost+autoCost+rndCost+capex;const profit=revenue-total;const lerner=f.price>0?Math.max(0,(f.price-c.mc)/f.price):0;
    return{revenue,profit,sold,unsold,produced,total,mc:c.mc,vcU:c.vcU,fc:c.fc,atc:sold>0?total/sold:c.fc,lerner,margin:revenue>0?profit/revenue*100:0};}
  function clearLeague(firms,structure,m,on,det){const sh=shares(firms,structure,m,det);const out=firms.map(f=>{const s=sh.find(x=>x.id===f.id);return{...f,_r:firmResult(f,m,on,s.demand),share:s.share};});
    const ranked=[...out].sort((a,b)=>(b.cash+b._r.profit)-(a.cash+a._r.profit));const rk={};ranked.forEach((f,i)=>rk[f.id]=i+1);
    const results=out.map(f=>({id:f.id,...f._r,share:f.share,rank:rk[f.id]}));
    const updated=out.map(f=>({...f,_r:undefined,cash:f.cash+f._r.profit,cum_profit:(f.cum_profit||0)+f._r.profit,last_profit:f._r.profit,cum_revenue:(f.cum_revenue||0)+f._r.revenue,last_revenue:f._r.revenue,share:f.share,rnd_stock:(f.rnd_stock||0)+(f.rnd||0),capacity:f.capacity+(f.capacity_buy||0),capacity_buy:0}));
    return{results,firms:updated};}
  function priceSweep(f,rivals,structure,m,on){const cap=(f.capacity||11000)+(f.capacity_buy||0);const out=[];for(let p=f.vc*0.95;p<=f.vc*4.5;p+=f.vc*0.05){const t={...f,price:p};const s=shares([t,...rivals],structure,m,true).find(x=>x.id===f.id);const prod=Math.min(Math.round(s.demand),cap);const r=firmResult({...t,production:prod},m,true,s.demand);out.push({price:Math.round(p/5)*5,profit:r.profit,revenue:r.revenue,sold:r.sold});}return out;}
  function botDecision(f,rivals,round,structure,m,on){const obj=f.objective||'profit';const grow=obj==='growth';const S=structOf(structure);
    const planned={...f,marketing:S.bM>0?clamp((f.marketing||5)+(grow?1:0),1,10):1,quality:S.bQ>0?clamp((f.quality||5)+(f.bot_strategy==='differentiator'?0.2:0),1,10):(f.quality||5),rnd:S.bQ>0?(grow?50000:40000):0,capacity_buy:(grow&&round>=2&&(f.cash||0)>900000)?500:0};
    const sweep=priceSweep(planned,rivals,structure,m,true);const pmax=sweep.reduce((a,b)=>b.profit>a.profit?b:a);const sol=sweep.filter(x=>x.profit>=0);
    let pick;if(obj==='revenue')pick=sol.length?sol.reduce((a,b)=>b.revenue>a.revenue?b:a):pmax;else if(obj==='growth')pick=sol.length?sol.reduce((a,b)=>b.sold>a.sold?b:a):pmax;else pick=pmax;
    const floorP=Math.min(pick.price,...rivals.map(r=>r.price));const sym=rivals.map(r=>({...r,price:(r.price+floorP)/2}));const sAt=shares([{...planned,price:pick.price},...sym],structure,m,true).find(x=>x.id===f.id);const cap=(planned.capacity||11000)+(planned.capacity_buy||0);
    return{...planned,price:pick.price,production:Math.round(clamp(Math.min(sAt.demand,cap),300,cap))};}
  function score(f,w){if(w==='revenue')return f.cum_revenue||f.last_revenue||0;if(w==='growth')return (f.share||0)*1e6+(f.capacity||0);return f.cash;}
  function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
  root.EconEngine={START_CAPITAL,MKT_COST,START_CAPACITY,START_FC,START_VC,MACRO,macroOf,STRUCTURES,structOf,unitVC,costs,shares,firmResult,clearLeague,priceSweep,botDecision,score};
})(window);
</script>


<!-- FOUNDER CAMPAIGN -->
<script>
const E=window.EconEngine;
const inr=n=>'₹'+Math.round(n).toLocaleString('en-IN');
const pctf=r=>{const v=r*100; return (Math.round(v*10)/10)+'%';};
// motion helpers (offline, dependency-free). Respect the user's reduced-motion setting.
const prefersReduced=()=>{ try{ return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){ return false; } };
// ---- smooth SVG morphing: patch geometry in place so charts glide instead of snapping ----
function _mvTok(str){ const re=/-?\d*\.?\d+(?:[eE][-+]?\d+)?/g; let m,last=0,tmpl=[],nums=[]; while((m=re.exec(str))){ tmpl.push(str.slice(last,m.index)); nums.push(parseFloat(m[0])); last=m.index+m[0].length; } tmpl.push(str.slice(last)); return {tmpl,nums}; }
function _mvBuild(tmpl,nums){ let s=tmpl[0]; for(let i=0;i<nums.length;i++){ s+=(Math.round(nums[i]*100)/100)+tmpl[i+1]; } return s; }
const _MVNUM=['cx','cy','r','rx','ry','x','y','width','height','x1','y1','x2','y2','opacity','fill-opacity','stroke-opacity','stroke-width','offset','font-size'];
function morphSVG(host,newHTML,dur){
  try{
    dur=(dur==null?120:dur);
    const cur=host.querySelector('svg'); const tmp=document.createElement('div'); tmp.innerHTML=newHTML; const nx=tmp.querySelector('svg');
    if(!cur||!nx){ host.innerHTML=newHTML; return; }
    const O=cur.querySelectorAll('*'), N=nx.querySelectorAll('*');
    if(O.length!==N.length){ cur.replaceWith(nx); return; }
    for(let i=0;i<O.length;i++){ if(O[i].tagName!==N[i].tagName){ cur.replaceWith(nx); return; } }
    const plans=[];
    for(let i=0;i<O.length;i++){ const o=O[i],n=N[i],p={o,nums:[],pts:null,d:null};
      for(const a of _MVNUM){ if(n.hasAttribute(a)){ const to=parseFloat(n.getAttribute(a)); let fr=o.hasAttribute(a)?parseFloat(o.getAttribute(a)):to; if(!isNaN(to)&&!isNaN(fr)) p.nums.push({a,fr,to}); } }
      for(const at of n.attributes){ const nm=at.name; if(_MVNUM.indexOf(nm)<0&&nm!=='points'&&nm!=='d'){ if(o.getAttribute(nm)!==at.value) o.setAttribute(nm,at.value); } }
      if(n.hasAttribute('points')){ const T=_mvTok(n.getAttribute('points')),F=_mvTok(o.getAttribute('points')||n.getAttribute('points')); if(F.nums.length===T.nums.length) p.pts={fr:F.nums,to:T.nums,tmpl:T.tmpl}; else o.setAttribute('points',n.getAttribute('points')); }
      if(n.hasAttribute('d')){ const ds=n.getAttribute('d'); const T=_mvTok(ds),F=_mvTok(o.getAttribute('d')||ds); if(F.nums.length===T.nums.length&&F.tmpl.join('\u0001')===T.tmpl.join('\u0001')) p.d={fr:F.nums,to:T.nums,tmpl:T.tmpl}; else o.setAttribute('d',ds); }
      if(n.children.length===0&&o.textContent!==n.textContent) o.textContent=n.textContent;
      plans.push(p);
    }
    if(host._mvRAF){ cancelAnimationFrame(host._mvRAF); host._mvRAF=null; }
    if(prefersReduced()||dur<=0){ for(const p of plans){ for(const x of p.nums)p.o.setAttribute(x.a,x.to); if(p.pts)p.o.setAttribute('points',_mvBuild(p.pts.tmpl,p.pts.to)); if(p.d)p.o.setAttribute('d',_mvBuild(p.d.tmpl,p.d.to)); } return; }
    const t0=performance.now();
    const step=now=>{ const k=Math.min(1,(now-t0)/dur),e=1-Math.pow(1-k,3);
      for(const p of plans){ for(const x of p.nums)p.o.setAttribute(x.a,x.fr+(x.to-x.fr)*e);
        if(p.pts){ const a=p.pts.fr,b=p.pts.to; p.o.setAttribute('points',_mvBuild(p.pts.tmpl,a.map((v,j)=>v+(b[j]-v)*e))); }
        if(p.d){ const a=p.d.fr,b=p.d.to; p.o.setAttribute('d',_mvBuild(p.d.tmpl,a.map((v,j)=>v+(b[j]-v)*e))); } }
      if(k<1) host._mvRAF=requestAnimationFrame(step);
      else { for(const p of plans){ for(const x of p.nums)p.o.setAttribute(x.a,x.to); if(p.pts)p.o.setAttribute('points',_mvBuild(p.pts.tmpl,p.pts.to)); if(p.d)p.o.setAttribute('d',_mvBuild(p.d.tmpl,p.d.to)); } host._mvRAF=null; }
    };
    host._mvRAF=requestAnimationFrame(step);
  }catch(e){ try{ host.innerHTML=newHTML; }catch(_){} }
}

function countUp(el, to, fmt, from){ // tween a number, formatting each frame
  if(!el) return; fmt=fmt||(v=>Math.round(v).toLocaleString('en-IN'));
  from=(from==null)?0:from;
  if(prefersReduced() || from===to || typeof to!=='number'){ el.textContent=fmt(to); return; }
  const t0=performance.now(), dur=620;
  const step=now=>{ const p=Math.min(1,(now-t0)/dur); const e=1-Math.pow(1-p,3); el.textContent=fmt(from+(to-from)*e); if(p<1) requestAnimationFrame(step); };
  requestAnimationFrame(step);
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2200);}
function npv(rate, upfront, flows){let v=-upfront;flows.forEach((cf,t)=>v+=cf/Math.pow(1+rate,t+1));return v;}
// show the NPV calculation written out: −upfront + cf1/(1+r) + cf2/(1+r)² + …
function npvWorking(upfront, flows, rate){
  const sup=['','','²','³','⁴','⁵'];
  const terms=flows.map((f,t)=>`${Math.round(f).toLocaleString('en-IN')}/${(1+rate).toFixed(2)}${t===0?'':sup[t+1]}`);
  return `−${upfront.toLocaleString('en-IN')} + ${terms.join(' + ')}`;
}

/* ---- Lumen's market demand (linear, for teaching clarity in Acts 2 & 4) ----
   Q = a - b*P. A determinant change shifts 'a' (the whole curve moves);
   a price change is a movement ALONG the curve. Choke price = a/b. */
const DEMAND={a:20000,b:80};
const qOf=(p,shift=0)=>Math.max(0, DEMAND.a+shift - DEMAND.b*p);
const chokeP=(shift=0)=>(DEMAND.a+shift)/DEMAND.b;

// build an SVG demand curve. opts: {price, shift, ghost} ghost draws the
// pre-shift curve faintly so a determinant shift is visible.
function demandSVG(opts){
  const {price=125, shift=0, ghost=null}=opts;
  const W=380,H=250,pad=40;
  const Qmax=DEMAND.a+Math.max(0,shift)+1000;
  const Pmax=Math.ceil(chokeP(Math.max(0,shift))/50)*50;
  const px=q=>pad+ q/Qmax*(W-pad-12);
  const py=p=>(H-pad)- p/Pmax*(H-pad-14);
  const line=(s)=>{const q0=DEMAND.a+s; return `M ${px(q0)} ${py(0)} L ${px(0)} ${py(chokeP(s))}`;};
  const q=qOf(price,shift);
  let ghostPath='';
  if(ghost!==null){ ghostPath=`<path d="${line(ghost)}" stroke="#365178" stroke-width="1.5" fill="none" stroke-dasharray="4 4" opacity=".6"/>`; }
  // axis ticks
  let ticks='';
  for(let p=0;p<=Pmax;p+=50){ ticks+=`<line x1="${pad}" y1="${py(p)}" x2="${W-8}" y2="${py(p)}" stroke="#15294a" stroke-width="1"/><text x="${pad-6}" y="${py(p)+3}" text-anchor="end" font-size="9" fill="#5f7aa0" font-family="monospace">${p}</text>`; }
  for(let qq=0;qq<=Qmax;qq+=5000){ ticks+=`<text x="${px(qq)}" y="${H-pad+14}" text-anchor="middle" font-size="9" fill="#5f7aa0" font-family="monospace">${qq/1000}k</text>`; }
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    ${ticks}
    <line x1="${pad}" y1="${py(0)}" x2="${W-8}" y2="${py(0)}" stroke="#2a4f86" stroke-width="1.5"/>
    <line x1="${pad}" y1="${py(0)}" x2="${pad}" y2="${py(Pmax)}" stroke="#2a4f86" stroke-width="1.5"/>
    ${ghostPath}
    <path d="${line(shift)}" stroke="#e0b54a" stroke-width="2.5" fill="none"/>
    <line x1="${px(q)}" y1="${py(price)}" x2="${px(q)}" y2="${py(0)}" stroke="#5b9bd5" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="${pad}" y1="${py(price)}" x2="${px(q)}" y2="${py(price)}" stroke="#5b9bd5" stroke-width="1" stroke-dasharray="3 3"/>
    <circle cx="${px(q)}" cy="${py(price)}" r="5" fill="#5b9bd5" stroke="#0a1626" stroke-width="2"/>
    <text x="${W-10}" y="${py(Pmax)+10}" text-anchor="end" font-size="10" fill="#8da6c8">Price ₹ (up) · Quantity (right)</text>
  </svg>`;
}

/* ---- Lumen's cost side (Acts 3 & 4) ----
   Total cost TC = FC + a·Q + b·Q². This gives the textbook U-shape:
     Marginal cost  MC  = a + 2bQ        (rises as output strains the plant)
     Avg variable   AVC = a + bQ
     Average cost   ATC = FC/Q + a + bQ  (falls as fixed cost spreads, then
                                          rises as diminishing returns bite)
   ATC is lowest where MC crosses it — the efficient scale, √(FC/b). */
const COST={FC:100000, a:80, b:0.00278};
const tcost =q=>COST.FC + COST.a*q + COST.b*q*q;
const vcost =q=>COST.a*q + COST.b*q*q;
const mcost =q=>COST.a + 2*COST.b*q;
const avcost=q=>COST.a + COST.b*q;
const atcost=q=>q>0? tcost(q)/q : 0;
const effScale=()=>Math.round(Math.sqrt(COST.FC/COST.b));

/* ---- Act 4: demand and cost on the same axes ----
   Inverse demand  P = (a − Q)/b           (price the market pays for output Q)
   Total revenue   TR = P·Q
   Marginal revenue MR = d(TR)/dQ = (a − 2Q)/b   (twice the slope of demand)
   Elasticity      |E| = (dQ/dP)(P/Q) = b·P/Q
   Profit maximised where MR = MC. */
const priceOf =q=>(DEMAND.a - q)/DEMAND.b;          // inverse demand
const mrOf    =q=>(DEMAND.a - 2*q)/DEMAND.b;        // marginal revenue
const elastOf =p=>{const q=qOf(p);return q>0? DEMAND.b*p/q : Infinity;};
const profitOf=q=>priceOf(q)*q - tcost(q);
const profitMaxQ=()=>Math.round((DEMAND.a/DEMAND.b - COST.a)/(2*(1/DEMAND.b + COST.b)));

// demand + marginal revenue + marginal cost on price/quantity axes
function marketSVG(opts){
  const {showMR=false, showMC=false, showSupply=false, markQ=null, markP=null}=opts;
  const W=380,H=250,pad=40, Qmax=20000, Pmax=260;
  const px=q=>pad+q/Qmax*(W-pad-12);
  const py=p=>(H-pad)-Math.min(p,Pmax)/Pmax*(H-pad-14);
  let ticks='';
  for(let p=0;p<=250;p+=50){ticks+=`<line x1="${pad}" y1="${py(p)}" x2="${W-8}" y2="${py(p)}" stroke="#15294a"/><text x="${pad-6}" y="${py(p)+3}" text-anchor="end" font-size="9" fill="#5f7aa0" font-family="monospace">${p}</text>`;}
  for(let q=0;q<=Qmax;q+=5000){ticks+=`<text x="${px(q)}" y="${H-pad+14}" text-anchor="middle" font-size="9" fill="#5f7aa0" font-family="monospace">${q/1000}k</text>`;}
  const demand=`M ${px(0)} ${py(priceOf(0))} L ${px(DEMAND.a)} ${py(0)}`;
  const mr=`M ${px(0)} ${py(mrOf(0))} L ${px(DEMAND.a/2)} ${py(0)}`;
  const mc=`M ${px(0)} ${py(mcost(0))} L ${px(Qmax)} ${py(mcost(Qmax))}`;
  let marks='';
  if(markQ!==null){ const p=priceOf(markQ); marks+=`<line x1="${px(markQ)}" y1="${py(0)}" x2="${px(markQ)}" y2="${py(Pmax)}" stroke="#fff" stroke-width="1" stroke-dasharray="3 3" opacity=".3"/><line x1="${pad}" y1="${py(p)}" x2="${px(markQ)}" y2="${py(p)}" stroke="#5b9bd5" stroke-width="1" stroke-dasharray="3 3"/><circle cx="${px(markQ)}" cy="${py(p)}" r="5" fill="#e0b54a" stroke="#0a1626" stroke-width="2"/>`; }
  if(markP!==null){ const q=qOf(markP); marks+=`<line x1="${px(q)}" y1="${py(0)}" x2="${px(q)}" y2="${py(markP)}" stroke="#5b9bd5" stroke-width="1" stroke-dasharray="3 3"/><circle cx="${px(q)}" cy="${py(markP)}" r="5" fill="#e0b54a" stroke="#0a1626" stroke-width="2"/>`; }
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    ${ticks}
    <line x1="${pad}" y1="${py(0)}" x2="${W-8}" y2="${py(0)}" stroke="#2a4f86"/>
    <line x1="${pad}" y1="${py(0)}" x2="${pad}" y2="${py(Pmax)}" stroke="#2a4f86"/>
    <path d="${demand}" stroke="#e0b54a" stroke-width="2.5" fill="none"/>
    <text x="${px(DEMAND.a)-2}" y="${py(0)-4}" text-anchor="end" font-size="9" fill="#e0b54a">demand</text>
    ${showMR?`<path d="${mr}" stroke="#e0b54a" stroke-width="1.5" fill="none" stroke-dasharray="5 4" opacity=".8"/><text x="${px(DEMAND.a/2)+2}" y="${py(0)-4}" font-size="9" fill="#c79a3a">MR</text>`:''}
    ${(showMC||showSupply)?`<path d="${mc}" stroke="#5b9bd5" stroke-width="2" fill="none"/><text x="${px(Qmax)-2}" y="${py(mcost(Qmax))-4}" text-anchor="end" font-size="9" fill="#5b9bd5">${showSupply?'supply = MC':'MC'}</text>`:''}
    ${marks}
    <text x="${W-10}" y="14" text-anchor="end" font-size="10" fill="#8da6c8">Price ₹ (up) · Quantity (right)</text>
  </svg>`;
}

/* ---- elasticity of OUR product (Act 2) ----
   A commodity bulb has many substitutes and is highly elastic (~2.6).
   Differentiation (brand + quality) removes perceived substitutes and
   pulls elasticity down toward 1 and below, earning pricing power. */
// elasticity is read off the real demand curve (|E| = b·P/Q); no separate product-elasticity model
const elasticType=E=>E>=1.8?'Highly elastic':E>1.15?'Elastic':E>0.85?'Unit elastic':E>0.2?'Inelastic':'Perfectly inelastic';
const elasticAdvice=E=>E>1.15?'Cutting price would grow revenue, and a price hike would push buyers to rivals.':E>0.85?'Price changes barely move revenue here, so compete on quality and brand instead.':'You could raise price and keep most buyers, which lifts revenue.';
function elasticSpectrumSVG(E){
  const W=380,H=112,pad=26,Emax=3,barY=42,barH=18;
  const x=e=>pad+Math.min(Math.max(e,0),Emax)/Emax*(W-2*pad), unitX=x(1);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <defs><linearGradient id="elg" x1="0" x2="1"><stop offset="0" stop-color="#37b27e"/><stop offset="33%" stop-color="#e0b54a"/><stop offset="100%" stop-color="#e5594d"/></linearGradient></defs>
    <text x="${pad}" y="${barY-9}" font-size="9" fill="#5f7aa0">0</text>
    <text x="${W-pad}" y="${barY-9}" text-anchor="end" font-size="9" fill="#5f7aa0">3+</text>
    <rect x="${pad}" y="${barY}" width="${W-2*pad}" height="${barH}" rx="9" fill="url(#elg)" opacity=".88"/>
    <line x1="${unitX}" y1="${barY-6}" x2="${unitX}" y2="${barY+barH+6}" stroke="#fff" stroke-width="1.5"/>
    <text x="${unitX}" y="${barY-9}" text-anchor="middle" font-size="9" fill="#cdd9ea">|E| = 1</text>
    <text x="${pad}" y="${barY+barH+16}" font-size="9.5" fill="#37b27e">inelastic · raise price</text>

const MONO_P=180, COMP_MC=111;            // monopoly price and the MC floor from Act 4
const priceN=n=>COMP_MC + (MONO_P-COMP_MC)/n;   // price falls toward MC as rivals multiply
function structOfN(n){ return n<=1?'Monopoly':n===2?'Duopoly':n<=5?'Oligopoly':n<=12?'Monopolistic competition':'Perfect competition'; }

// price-vs-number-of-rivals curve, falling toward the marginal-cost floor
function structureSVG(n){
  const W=380,H=200,pad=42, Nmax=20, Pmax=200, Pmin=90;
  const px=k=>pad+(k-1)/(Nmax-1)*(W-pad-12);
  const py=p=>(H-pad)-(p-Pmin)/(Pmax-Pmin)*(H-pad-14);
  let ticks='';
  for(let p=100;p<=200;p+=25){ticks+=`<line x1="${pad}" y1="${py(p)}" x2="${W-8}" y2="${py(p)}" stroke="#15294a"/><text x="${pad-6}" y="${py(p)+3}" text-anchor="end" font-size="9" fill="#5f7aa0" font-family="monospace">${p}</text>`;}
  [1,2,5,10,20].forEach(k=>ticks+=`<text x="${px(k)}" y="${H-pad+14}" text-anchor="middle" font-size="9" fill="#5f7aa0" font-family="monospace">${k}</text>`);
  let d='';for(let k=1;k<=Nmax;k+=0.25){d+=(d?'L':'M')+px(k).toFixed(1)+' '+py(priceN(k)).toFixed(1)+' ';}
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    ${ticks}
    <line x1="${pad}" y1="${py(Pmin)}" x2="${W-8}" y2="${py(Pmin)}" stroke="#2a4f86"/>
    <line x1="${pad}" y1="${py(Pmin)}" x2="${pad}" y2="${py(Pmax)}" stroke="#2a4f86"/>
    <line x1="${pad}" y1="${py(COMP_MC)}" x2="${W-8}" y2="${py(COMP_MC)}" stroke="#5b9bd5" stroke-width="1.5" stroke-dasharray="5 4"/><text x="${W-10}" y="${py(COMP_MC)-4}" text-anchor="end" font-size="9" fill="#5b9bd5">marginal cost ₹111</text>
    <path d="${d}" stroke="#e0b54a" stroke-width="2.5" fill="none"/>
    <line x1="${px(n)}" y1="${py(Pmin)}" x2="${px(n)}" y2="${py(priceN(n))}" stroke="#fff" stroke-width="1" stroke-dasharray="3 3" opacity=".35"/>
    <circle cx="${px(n)}" cy="${py(priceN(n))}" r="5" fill="#e0b54a" stroke="#0a1626" stroke-width="2"/>
    <text x="${W-10}" y="13" text-anchor="end" font-size="10" fill="#8da6c8">Price ₹ (up) · Number of firms (right)</text>
  </svg>`;
}

// 2x2 prisoner's-dilemma payoff matrix (profits in ₹'000)
function matrixSVG(hl){
  const cell=(you,them,on)=>`<div style="border:1px solid var(--line);border-radius:8px;padding:9px;text-align:center;background:${on?'#16315a':'#0f2342'}">
    <div style="color:var(--gold);font-size:15px;font-weight:600">₹${you}k</div>
    <div style="color:var(--faint);font-size:11px">you</div>
    <div style="color:#8da6c8;font-size:13px;margin-top:3px">₹${them}k <span style="font-size:10px">rival</span></div></div>`;
  return `<div style="display:grid;grid-template-columns:auto 1fr 1fr;gap:7px;font-size:12px;align-items:center">
    <div></div><div style="text-align:center;color:var(--muted)">Rival holds</div><div style="text-align:center;color:var(--muted)">Rival undercuts</div>
    <div style="color:var(--muted);writing-mode:vertical-rl;text-align:center">You hold</div>${cell(400,400,hl==='hh')}${cell(120,520,hl==='hu')}
    <div style="color:var(--muted);writing-mode:vertical-rl;text-align:center">You undercut</div>${cell(520,120,hl==='uh')}${cell(250,250,hl==='uu')}
  </div>`;
}

// cost-curve SVG. showMC adds the marginal-cost line and efficient-scale mark.
function costSVG(q, opt={}){
  const showMC=opt.showMC, capacity=opt.capacity||11000;
  const W=380,H=250,pad=42, Qmin=1000, Qmax=Math.max(capacity,effScale())*1.15, Ymax=200;
  const px=Q=>pad+(Q-Qmin)/(Qmax-Qmin)*(W-pad-12);
  const py=y=>(H-pad)-Math.min(y,Ymax)/Ymax*(H-pad-14);
  const path=fn=>{let d='';for(let Q=Qmin;Q<=Qmax;Q+=(Qmax-Qmin)/60){d+=(d?'L':'M')+px(Q).toFixed(1)+' '+py(fn(Q)).toFixed(1)+' ';}return d;};
  let ticks='';
  for(let y=0;y<=Ymax;y+=50){ticks+=`<line x1="${pad}" y1="${py(y)}" x2="${W-8}" y2="${py(y)}" stroke="#15294a"/><text x="${pad-6}" y="${py(y)+3}" text-anchor="end" font-size="9" fill="#5f7aa0" font-family="monospace">${y}</text>`;}
  for(let Q=Qmin;Q<Qmax;Q+=Math.max(1000,Math.round((Qmax-Qmin)/4/1000)*1000)){ticks+=`<text x="${px(Q)}" y="${H-pad+14}" text-anchor="middle" font-size="9" fill="#5f7aa0" font-family="monospace">${(Q/1000).toFixed(0)}k</text>`;}
  const es=effScale(), capX=px(Math.min(capacity,Qmax));
  const atcY=py(atcost(q)), mcY=py(mcost(q)), qx=px(q);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    ${ticks}
    <line x1="${pad}" y1="${py(0)}" x2="${W-8}" y2="${py(0)}" stroke="#2a4f86"/>
    <line x1="${pad}" y1="${py(0)}" x2="${pad}" y2="${py(Ymax)}" stroke="#2a4f86"/>
    <line x1="${capX}" y1="${py(0)}" x2="${capX}" y2="${py(Ymax)}" stroke="#e5594d" stroke-width="1" stroke-dasharray="4 3" opacity=".7"/>
    <text x="${capX-4}" y="${py(Ymax)+1}" text-anchor="end" font-size="9" fill="#e5594d">capacity</text>
    <path d="${path(atcost)}" stroke="#e0b54a" stroke-width="2.5" fill="none"/>
    ${showMC?`<path d="${path(mcost)}" stroke="#5b9bd5" stroke-width="2" fill="none"/>`:''}
    ${showMC?`<circle cx="${px(es)}" cy="${py(atcost(es))}" r="3.5" fill="#37b27e"/><text x="${px(es)}" y="${py(atcost(es))-8}" text-anchor="middle" font-size="9" fill="#37b27e">efficient scale</text>`:''}
    <line x1="${qx}" y1="${py(0)}" x2="${qx}" y2="${atcY}" stroke="#fff" stroke-width="1" stroke-dasharray="3 3" opacity=".35"/>
    <circle cx="${qx}" cy="${atcY}" r="5" fill="#e0b54a" stroke="#0a1626" stroke-width="2"/>
    ${showMC?`<circle cx="${qx}" cy="${mcY}" r="4" fill="#5b9bd5" stroke="#0a1626" stroke-width="2"/>`:''}
    <text x="${W-10}" y="${py(Ymax)+10}" text-anchor="end" font-size="10" fill="#8da6c8">₹/unit (up) · output (right) · ${showMC?'gold ATC · blue MC':'gold = average cost'}</text>
  </svg>`;
}

/* Backend bridge. When the file is served by Google Apps Script, the global
   `google.script.run` exists and we use it to log results and read the class
   leaderboard. As a plain double-clicked file it is absent, so everything
   degrades to offline (download + code) with zero errors. */
const CLASS_URL='';  /* faculty pastes their Apps Script /exec URL here to enable classroom mode from any host */
const NET={
  url(){ return (CLASS_URL||'').trim(); },
  gsrun(){ try{ return !!(typeof google!=='undefined' && google.script && google.script.run); }catch(e){ return false; } },
  online(){ return !!this.url() || this.gsrun(); },
  call(params, cb){
    if(this.url()){
      try{ const qs=Object.keys(params).map(k=>k+'='+encodeURIComponent(params[k])).join('&');
           fetch(this.url()+'?api=1&'+qs).then(r=>r.json()).then(j=>cb&&cb(j)).catch(()=>cb&&cb(null)); }
      catch(e){ cb&&cb(null); } return;
    }
    if(this.gsrun()){
      try{ google.script.run.withSuccessHandler(r=>cb&&cb(r)).withFailureHandler(()=>cb&&cb(null)).api(JSON.stringify(params)); }
      catch(e){ cb&&cb(null); } return;
    }
    cb&&cb(null);
  },
  submit(payload, cb){ if(this.gsrun()){ try{ google.script.run.withSuccessHandler(r=>cb&&cb(r||{ok:true})).withFailureHandler(e=>cb&&cb({error:String(e)})).submitResult(JSON.stringify(payload)); }catch(e){ cb&&cb({error:String(e)}); } return; } cb&&cb({offline:true}); },
  leaderboard(cb){ if(this.gsrun()){ try{ google.script.run.withSuccessHandler(r=>cb&&cb(r)).withFailureHandler(()=>cb&&cb(null)).getLeaderboard(); }catch(e){ cb&&cb(null); } return; } cb&&cb(null); },
  getGate(_section, cb){ const code=(S&&S.class&&S.class.code)||''; if(!code){ cb&&cb(null); return; } this.call({action:'gate',code:code}, cb); },
  logQuiz(concept, phase, score, total){ const c=(S&&S.class)||{}; if(!c.code) return; this.call({action:'quiz',code:c.code,sid:c.sid||'',concept:concept,phase:phase,score:score,total:total}, ()=>{}); },
  ping(pos){ const c=(S&&S.class)||{}; if(!c.code||!c.sid) return; this.call({action:'ping',sid:c.sid,pos:pos}, r=>{ if(r && r.directive && typeof F!=='undefined' && F.applyDirective) F.applyDirective(r.directive); }); },
  cloudSave(){ const c=(S&&S.class)||{}; if(!c.code||!c.uid) return;
    const bundle={};
    try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && k.indexOf('econventure_')===0 && k!=='econventure_cloudsave_lasthash') bundle[k]=localStorage.getItem(k); } }catch(e){}
    const payload=JSON.stringify(bundle);
    const hash = (function(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return String(h); })(payload);
    let lastHash=''; try{ lastHash=localStorage.getItem('econventure_cloudsave_lasthash')||''; }catch(e){}
    if(hash===lastHash) return;
    this.call({action:'save',code:c.code,uid:c.uid,gsub:c.google?c.google.sub||'':'',email:c.google?c.google.email||'':'',name:c.name||'',roll:(S.student&&S.student.id)||'',payload:payload}, r=>{
      if(r && r.ok){ try{ localStorage.setItem('econventure_cloudsave_lasthash', hash); }catch(e){} }
    });
  }
};

const F={
  start(){ S=fresh(); this.save(); this.render(); },
  save(){try{S._build=BUILD;localStorage.setItem(SAVE,JSON.stringify(S));}catch(e){}},
  load(){try{const s=JSON.parse(localStorage.getItem(SAVE)); return (s&&s._build===BUILD)?s:null;}catch(e){return null;}},
  reset(){if(confirm('Restart from the beginning?')){localStorage.removeItem(SAVE);this.start();}},

  fmt(str){ return (str||'').replace('{hurdle}', pctf(S.hurdle)).replace('{capacity}', (S.capacity||0).toLocaleString('en-IN')).replace('{launch}', S.launchPrice?inr(S.launchPrice):'—'); },

  actOf(idx){ let f=0; for(const a of MAP){ for(const n of a.nodes){ if(f===idx) return a.act; f++; } } return ''; },

  _statCache:{},
  renderStat(){
    const el=document.getElementById('stat');
    el.innerHTML=`
      <div class="st"><span class="v" id="stCash"></span><span class="l">cash</span></div>
      <div class="st"><span class="v" id="stHurdle"></span><span class="l">hurdle rate</span></div>
      <div class="st"><span class="v" id="stCap"></span><span class="l">capacity</span></div>
      <div class="st"><span class="v">${S.stage}/${TOTAL_IMPLEMENTED}</span><span class="l">progress</span></div>`;
    const c=this._statCache;
    countUp(document.getElementById('stCash'), S.cash, inr, c.cash); c.cash=S.cash;
    countUp(document.getElementById('stHurdle'), S.hurdle, pctf, c.hurdle); c.hurdle=S.hurdle;
    const capEl=document.getElementById('stCap'), cap=S.capacity||0;
    countUp(capEl, cap, v=> v? Math.round(v).toLocaleString('en-IN') : '—', c.cap); c.cap=cap;
  },

  renderRail(){
    let flat=0;
    const html=MAP.map(act=>{
      const nodes=act.nodes.map(n=>{
        const idx=flat++; let cls='locked';
        if(idx<S.stage) cls='done'; else if(idx===S.stage) cls='active';
        return `<div class="node ${cls}"><span class="dot"></span>${n}</div>`;
      }).join('');
      return `<div class="act"><div class="ah">${act.act}</div>${nodes}</div>`;
    }).join('');
    document.getElementById('rail').innerHTML=html;
  },

  clearShell(){ const s=document.getElementById('stat'); if(s)s.innerHTML=''; const r=document.getElementById('rail'); if(r)r.innerHTML=''; },

  render(){
    if(S.phase==='id'){ this.clearShell(); return this.renderIdentity(); }
    if(S.phase==='pre'||S.phase==='post'){ this.clearShell(); return this.renderQuiz(S.phase); }
    if(S.phase==='report'){ this.clearShell(); return this.renderFinalReport(); }
    if(S.phase==='tournament'){ this.renderStat(); this.renderRail(); return this.renderCompete(STAGES.find(s=>s.kind==='compete')); }
    this.renderStat(); this.renderRail();
    const host=document.getElementById('stage');
    if(S.stage>=TOTAL_IMPLEMENTED){ S.phase='post'; S.qIdx=0; S.postAns=[]; this.save(); this.clearShell(); return this.renderQuiz('post'); }
    // Fail-closed pacing: if the student joined a class, they MUST have a live gate to proceed.
    // The only permitted "no gate" case is solo practice (no class code entered at all).
    const joinedClass = !!(S.class && S.class.code);
    if(joinedClass){
      if(GATE.offline){ return this.renderWaiting('reconnecting'); }
      if(GATE.paced && (GATE.paused || (Array.isArray(GATE.l1open) && GATE.l1open.indexOf(S.stage)<0))){ return this.renderWaiting(); }
    }
    /* concept wall: opening quiz gates entry into a concept the student has not opened yet */
    if(S.cQ && CQUIZ[S.stage]){
      if(!S.cQ.doneOpen[S.stage] && S.cQ.phase!=='cOpen'){ S.cQ.stage=S.stage; S.cQ.phase='cOpen'; S.cQ.qIdx=0; S.cQ.openScore=null; this.save(); this.clearShell(); return this.renderConceptQuiz('open'); }
      if(S.cQ.phase==='cOpen'){ this.clearShell(); return this.renderConceptQuiz('open'); }
      if(S.cQ.phase==='cClose'){ this.clearShell(); return this.renderConceptQuiz('close'); }
    }
    this._stopGatePoll();
    const st=STAGES[S.stage];
    if(st.kind==='interactive'){ return this.renderInteractive(st); }
    if(st.kind==='compete'){ return this.renderCompete(st); }
    S._sel=null;
    const opts=st.options.map((o,i)=>{
      let pay = o.pay ? o.pay() : '';
      let calc = o.calc ? o.calc : '';
      if(st.npvStage){
        const v=npv(S.hurdle,o.cf.up,o.cf.flows);
        pay=`NPV at ${pctf(S.hurdle)}: <b class="${v>=0?'good':'bad'}">${(v>=0?'+':'')+inr(v)}</b> · capacity ${o.cf.cap.toLocaleString('en-IN')}`;
        calc=`NPV = ${npvWorking(o.cf.up,o.cf.flows,S.hurdle)}`;
      }
      return `<div class="opt" data-i="${i}" onclick="F.pick(${i})">
        <div class="lab">${o.lab}</div><div class="det">${o.det}</div>
        <div class="pay">${pay}${calc?`<br><span style="color:var(--faint);font-size:10.5px;font-family:var(--mono)">${calc}</span>`:''}</div></div>`;
    }).join('');
    host.innerHTML=`
      <div class="panel">
        <div class="eyebrow">${this.actOf(S.stage)} · ${st.concept}</div>
        <h2 style="margin-bottom:12px">${st.title}</h2>
        <div class="situation">${this.fmt(st.situation)}</div>
        ${st.visual?st.visual():''}
        <div class="prompt">${this.fmt(st.prompt)}</div>
        <div class="hint">${this.fmt(st.hint||'')}</div>
        <div class="opts" id="opts">${opts}</div>
        <div class="row" style="margin-top:16px">
          <button class="ghost" onclick="F.reset()">Restart</button>
          <button class="primary right" id="commitBtn" disabled onclick="F.commit()">Commit decision</button>
        </div>
      </div>`;
  },

  /* live demand-curve stage: a slider drives the curve and the readouts */
  /* generic live-widget stage: a slider drives a visual and readouts.
     Each interactive stage supplies slider/draw/readouts/onCommit. */
  renderInteractive(st){
    const k=st.slider.key;
    if(S[k]===undefined||S[k]===null) S[k]=st.slider.init;
    const host=document.getElementById('stage');
    host.innerHTML=`
      <div class="panel">
        <div class="eyebrow">${this.actOf(S.stage)} · ${st.concept}</div>
        <h2 style="margin-bottom:12px">${st.title}</h2>
        <div class="situation">${this.fmt(st.situation)}</div>
        <div style="border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin:14px 0;background:#0f2342">
          <div id="ivis">${st.draw(S[k])}</div>
          <div class="lever" style="margin-top:6px">
            <div class="top"><span class="name">${st.slider.label}</span><span class="val" id="ivv">${st.slider.fmt(S[k])}</span></div>
            <input type="range" id="islider" min="${st.slider.min}" max="${st.slider.max}" step="${st.slider.step}" value="${S[k]}" style="width:100%" oninput="F.onSlide(+this.value)">
          </div>
          <div class="readout" id="iread" style="grid-template-columns:repeat(${st.readouts(S[k]).length},1fr)"></div>
          ${st.work?'<div class="working" id="iwork"></div>':''}
        </div>
        <div class="prompt">${this.fmt(st.prompt)}</div>
        <div class="hint">${this.fmt(st.hint||'')}</div>
        <div class="row" style="margin-top:16px">
          <button class="ghost" onclick="F.reset()">Restart</button>
          <button class="primary right" onclick="F.commit()">${st.commitLabel(S[k])}</button>
        </div>
      </div>`;
    this.onSlide(S[k]);
    // one-shot draw-in: only the freshly mounted chart animates; drag updates stay instant
    const svg=host.querySelector('#ivis svg'); if(svg && !prefersReduced()) svg.classList.add('chartIn');
  },

  onSlide(v){
    const st=STAGES[S.stage], k=st.slider.key; S[k]=v;
    const el=id=>document.getElementById(id);
    if(el('ivis')) morphSVG(el('ivis'),st.draw(v));
    if(el('ivv')) el('ivv').textContent=st.slider.fmt(v);
    if(el('iread')) el('iread').innerHTML=st.readouts(v).map(r=>`<div class="ro"><div class="l">${r.l}</div><div class="v" style="font-size:15px">${r.v}</div></div>`).join('');
    if(el('iwork')&&st.work) el('iwork').innerHTML='<div class="wh">How these numbers are computed</div>'+st.work(v).map(w=>`<span class="wl">${w}</span>`).join('');
  },

  /* ===== Act 5 finale: a real multi-quarter run on the embedded engine ===== */
  startRun(st){
    const PROFILES=[
      {name:'Vane Lighting', obj:'profit',  strat:'profit'},
      {name:'BrightCo',      obj:'revenue', strat:'cost-leader'},
      {name:'Lumos Labs',    obj:'growth',  strat:'differentiator'},
      {name:'Kethri Glow',   obj:'profit',  strat:'responder'},
      {name:'Watt Works',    obj:'revenue', strat:'cost-leader'},
      {name:'Nova Bright',   obj:'growth',  strat:'differentiator'},
      {name:'Halo Co',       obj:'profit',  strat:'profit'}];
    const tour=(S.phase==='tournament');
    const structure=tour?'oligopoly':(S.structure||'oligopoly'), Sx=E.structOf(structure), nRiv=Sx.firms-1;
    const cap=tour?11000:(S.capacity||7000); // tournament fixes capacity so every student is equal
    const bots=PROFILES.slice(0,nRiv).map((p,i)=>({id:'b'+i,name:p.name,is_bot:true,vc:E.START_VC,fc:E.START_FC,capacity:11000,cash:E.START_CAPITAL,marketing:5,quality:5,price:Math.round(Sx.Pref),objective:p.obj,bot_strategy:p.strat}));
    const you={id:'you',name:'Lumen (you)',is_bot:false,vc:E.START_VC,fc:E.START_FC,capacity:cap,cash:E.START_CAPITAL,marketing:5,quality:5,price:Math.round(Sx.Pref),objective:'profit'};
    S.run={structure, maxQ:st.maxQ||4, q:1, firms:[you,...bots], history:[], done:false, price:Math.round(Sx.Pref), tour};
    this.save();
  },

  // live estimate of this quarter's outcome at the current slider price
  runPreview(price){
    const r=S.run, m=E.macroOf(r.q), firms=r.firms.map(f=>({...f}));
    const me=firms.find(f=>!f.is_bot); me.price=price;
    const myS=E.shares(firms,r.structure,m,true).find(x=>x.id===me.id);
    const prod=Math.min(Math.round(myS.demand), me.capacity);
    const res=E.firmResult({...me,production:prod},m,true,myS.demand);
    return {demand:Math.round(myS.demand), profit:res.profit, mc:Math.round(res.mc)};
  },

  setRunPrice(v){
    S.run.price=v;
    const p=this.runPreview(v), el=id=>document.getElementById(id);
    if(el('rpv')) el('rpv').textContent=inr(v);
    if(el('rprev')) el('rprev').innerHTML=
      `<div class="ro"><div class="l">Est. bulbs sold</div><div class="v" style="font-size:15px">${p.demand.toLocaleString('en-IN')}</div></div>`+
      `<div class="ro"><div class="l">Marginal cost</div><div class="v" style="font-size:15px">${inr(p.mc)}</div></div>`+
      `<div class="ro"><div class="l">Est. profit</div><div class="v" style="font-size:15px"><b class="${p.profit>=0?'good':'bad'}">${inr(p.profit)}</b></div></div>`;
  },

  runQuarter(){
    const r=S.run, m=E.macroOf(r.q);
    let firms=r.firms.map(f=>({...f}));
    const me=firms.find(f=>!f.is_bot); me.price=r.price;
    firms=firms.map(f=>{ if(!f.is_bot) return f; const rivals=firms.filter(x=>x.id!==f.id); return E.botDecision(f, rivals, r.q, r.structure, m, true); });
    const myShare=E.shares(firms,r.structure,m,true).find(x=>x.id===me.id);
    firms.find(f=>f.id==='you').production=Math.min(Math.round(myShare.demand), me.capacity);
    const {results, firms:updated}=E.clearLeague(firms, r.structure, m, true, r.tour); // det=true in tournament so identical play => identical score
    const myRes=results.find(x=>x.id==='you');
    r.history.push({q:r.q, macro:m, price:r.price, profit:myRes.profit, share:myRes.share, sold:myRes.sold, rank:myRes.rank,
      rivals:updated.filter(f=>f.is_bot).map(f=>({name:f.name, price:f.price}))});
    r.firms=updated; r.q++;
    if(r.q>r.maxQ) r.done=true;
    this.save(); this.renderCompete(S.run&&S.run.tour ? STAGES.find(s=>s.kind==='compete') : STAGES[S.stage]);
  },

  renderCompete(st){
    if(!S.run) this.startRun(st);
    const r=S.run;
    if(r.done) return r.tour ? this.renderTournamentDone(st) : this.renderFinal(st);
    const m=E.macroOf(r.q);
    const tone={positive:'#37b27e',negative:'#e0b54a',crisis:'#e5594d',neutral:'#5b9bd5'}[m.type]||'#5b9bd5';
    const ranked=[...r.firms].sort((a,b)=>b.cash-a.cash);
    const standings=ranked.map((f,i)=>`<tr style="${f.is_bot?'':'background:#16315a'}"><td>${i+1}</td><td>${f.name}</td><td style="text-align:right">${inr(f.cash)}</td></tr>`).join('');
    const last=r.history[r.history.length-1];
    const recap = last? `<div class="payoff" style="margin:12px 0"><div class="h">Last quarter (Q${last.q})</div>
        <div class="fb">You priced <b>${inr(last.price)}</b>, sold <b>${last.sold.toLocaleString('en-IN')}</b>, profit <b class="${last.profit>=0?'good':'bad'}">${inr(last.profit)}</b>, finishing <b>#${last.rank}</b>.
        Rivals: ${last.rivals.map(x=>x.name.split(' ')[0]+' '+inr(x.price)).join(' · ')}.</div></div>`:'';
    const Sx=E.structOf(r.structure);
    document.getElementById('stage').innerHTML=`
      <div class="panel">
        <div class="eyebrow">${r.tour?'Class Tournament · standardized market':this.actOf(S.stage)+' · '+st.concept}</div>
        <h2 style="margin-bottom:8px">${r.tour?'Tournament run':st.title}</h2>
        ${r.q===1?`<div class="situation">${r.tour?'Same market, same rivals, same shocks for every student. Your total profit across four quarters is your tournament score. Pure pricing skill, no luck.':this.fmt(st.situation)}</div>`:''}
        <div style="display:flex;justify-content:space-between;align-items:center;margin:10px 0 4px"><div style="font-weight:600">Quarter ${r.q} of ${r.maxQ}</div><div style="font-size:12px;color:var(--muted)">${Sx.label} · ${r.firms.length} firms</div></div>
        <div style="border:1px solid ${tone};border-radius:9px;padding:9px 12px;margin:8px 0;background:#0f2342">
          <span style="color:${tone};font-weight:700;font-size:11px;letter-spacing:.06em">BREAKING · ${m.tag}</span>
          <span style="font-size:12.5px;color:var(--muted)"> demand ${m.demand>=1?'×':'×'}${m.demand.toFixed(2)} · costs ×${m.cost.toFixed(2)} · interest ${pctf(m.rate)}</span>
        </div>
        ${recap}
        <table><thead><tr><th>#</th><th>Firm</th><th style="text-align:right">Cash</th></tr></thead><tbody>${standings}</tbody></table>
        <div style="border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin:14px 0;background:#0f2342">
          <div class="lever"><div class="top"><span class="name">Your price this quarter</span><span class="val" id="rpv">${inr(r.price)}</span></div>
            <input type="range" id="rprice" min="100" max="320" step="5" value="${r.price}" style="width:100%" oninput="F.setRunPrice(+this.value)"></div>
          <div class="readout" id="rprev" style="grid-template-columns:1fr 1fr 1fr;margin-top:8px"></div>
          <div class="faint" style="font-size:11px;margin-top:8px">Estimate assumes rivals hold last quarter\u2019s prices. They won\u2019t exactly, so treat it as a guide, not a guarantee.</div>
        </div>
        <div class="row" style="margin-top:14px">
          <button class="ghost" onclick="F.reset()">Restart</button>
          <button class="primary right" onclick="F.runQuarter()">Submit price · run Q${r.q}</button>
        </div>
      </div>`;
    this.renderStat(); this.renderRail(); this.setRunPrice(r.price);
  },

  renderFinal(st){
    const r=S.run, ranked=[...r.firms].sort((a,b)=>b.cash-a.cash);
    const myRank=ranked.findIndex(f=>f.id==='you')+1;
    const me=r.firms.find(f=>f.id==='you');
    const totProfit=r.history.reduce((s,h)=>s+h.profit,0);
    const avgPrice=Math.round(r.history.reduce((s,h)=>s+h.price,0)/r.history.length);
    const recQ=r.history.find(h=>h.macro.type==='crisis');
    const badges=[];
    if(r.history.some(h=>h.profit>0)) badges.push('First Profit');
    if(myRank===1) badges.push('Market Leader');
    if(recQ && recQ.profit>0) badges.push('Survived the Recession');
    if(avgPrice>=130 && avgPrice<=200) badges.push('Price Discipline');
    if(me.cash>E.START_CAPITAL) badges.push('Grew the Business');
    const standings=ranked.map((f,i)=>`<tr style="${f.is_bot?'':'background:#16315a'}"><td>${i+1}</td><td>${f.name}</td><td style="text-align:right">${inr(f.cash)}</td><td style="text-align:right">${(f.share*100||0).toFixed(0)}%</td></tr>`).join('');
    document.getElementById('stage').innerHTML=`
      <div class="panel">
        <div class="eyebrow">${this.actOf(S.stage)} · final report</div>
        <h2 style="margin-bottom:8px">Lumen finished #${myRank} of ${r.firms.length}</h2>
        <p class="muted" style="font-size:14px">Four quarters, real rivals, one recession. Total profit <b class="${totProfit>=0?'good':'bad'}">${inr(totProfit)}</b>, average price <b>${inr(avgPrice)}</b>, ending cash <b>${inr(me.cash)}</b>.</p>
        <table><thead><tr><th>#</th><th>Firm</th><th style="text-align:right">Cash</th><th style="text-align:right">Share</th></tr></thead><tbody>${standings}</tbody></table>
        ${badges.length?`<div class="toolkit" style="margin-top:12px">${badges.map(b=>`<span class="chip">★ ${b}</span>`).join('')}</div>`:''}
        <div class="reinforce" style="margin-top:14px"><div class="tag">What the run taught</div>
          <p>${this.fmt(st.reinforce.body)}</p><div class="key">${this.fmt(st.reinforce.key)}</div></div>
        <div class="row" style="margin-top:16px">
          <button class="ghost" onclick="F.replayRun()">Run it again</button>
          <button class="primary right" onclick="F.next()">Finish the journey</button>
        </div>
      </div>`;
    this.renderStat(); this.renderRail();
    if(!S.toolkit.includes(st.concept)){ S.toolkit.push(st.concept); S.log.push({concept:st.concept, choice:`Finished #${myRank}, profit ${inr(totProfit)}`}); this.save(); }
  },

  replayRun(){ S.run=null; this.renderCompete(STAGES[S.stage]); },

  pick(i){
    S._sel=i;
    document.querySelectorAll('.opt').forEach((el,j)=>el.classList.toggle('sel',j===i));
    document.getElementById('commitBtn').disabled=false;
  },

  commit(){
    const st=STAGES[S.stage];
    // interactive (slider) stages commit the chosen value via onCommit
    if(st.kind==='interactive'){
      const v=S[st.slider.key];
      const r=st.onCommit(v,S);
      if(!S.toolkit.includes(st.concept)) S.toolkit.push(st.concept);
      S.log.push({concept:st.concept, choice:r.choice});
      return this.showResult(st, r.fb, r.best||'');
    }
    const o=st.options[S._sel];
    o.apply(S);
    if(!S.toolkit.includes(st.concept)) S.toolkit.push(st.concept);
    S.log.push({concept:st.concept, choice:o.lab});
    let best='';
    if(st.npvStage){
      const ranked=[...st.options].map(x=>({x,v:npv(S.hurdle,x.cf.up,x.cf.flows)})).sort((a,b)=>b.v-a.v);
      const top=ranked[0].x;
      best = (top.id===o.id)
        ? `You picked the highest-NPV option at your hurdle rate. Good capital budgeting.`
        : `The highest-NPV option at your ${pctf(S.hurdle)} hurdle was <b>${top.lab.split('—')[0].trim()}</b> (${(ranked[0].v>=0?'+':'')+inr(ranked[0].v)}). You left value on the table — the cost of not discounting.`;
      const myv=npv(S.hurdle,o.cf.up,o.cf.flows);
      best += `<br><span style="color:var(--faint);font-size:11px;font-family:var(--mono)">Your NPV = ${npvWorking(o.cf.up,o.cf.flows,S.hurdle)} = <b style="color:var(--gold)">${(myv>=0?'+':'')+inr(myv)}</b></span>`;
    } else if(o.best===true){ best='Solid — that\u2019s the concept exactly.'; }
    else if(o.best===false){ best='Workable, but read the reinforcement: the concept is sharper than that choice.'; }
    this.showResult(st, this.fmt(o.fb||''), best);
  },

  showResult(st, fb, best){
    const reEl=`<div class="reinforce"><div class="tag">Concept locked in · ${st.reinforce.concept}</div>
      <h3>${st.reinforce.concept}</h3><p>${this.fmt(st.reinforce.body)}</p>
      <div class="key">${this.fmt(st.reinforce.key)}</div>
      <div class="toolkit">${S.toolkit.map(c=>`<span class="chip">✓ ${c}</span>`).join('')}</div></div>`;
    document.getElementById('stage').innerHTML=`
      <div class="panel">
        <div class="eyebrow">Your decision · ${st.concept}</div>
        <h2 style="margin-bottom:6px">${st.concept}</h2>
        <div class="payoff"><div class="h">What it means</div>
          <div class="fb">${fb}${best?'<br><br>'+best:''}</div></div>
        ${reEl}
        <div class="row" style="margin-top:18px">
          <button class="ghost" onclick="F.reset()">Restart</button>
          <button class="primary right" onclick="F.next()">Continue</button>
        </div>
      </div>`;
    this.renderStat(); this.renderRail(); this.save();
  },

  next(){
    // If we just finished a concept in play phase and haven't done its closing quiz, run it before advancing.
    if(S.phase==='play' && S.stage<CQUIZ.length && CQUIZ[S.stage] && !S.cQ.doneClose[S.stage]){
      S.cQ.stage=S.stage; S.cQ.phase='cClose'; S.cQ.qIdx=0; S.cQ.closeAns=[];
      this.save(); this.render(); window.scrollTo(0,0);
      return;
    }
    S.stage++; this.save(); this.refreshGate(()=>{ this.render(); }); window.scrollTo(0,0);
    try{ NET.ping('L1:'+S.stage); }catch(e){}
  },

  /* which MAP act (0=Prologue .. 5=Act 5) a flat stage index belongs to */
  actIndexOfStage(idx){ let flat=0; for(let a=0;a<MAP.length;a++){ for(let n=0;n<MAP[a].nodes.length;n++){ if(flat===idx) return a; flat++; } } return MAP.length-1; },

  refreshGate(cb){
    if(!NET.online() || !S.class || !S.class.code){ GATE={paced:false, open:null, l1open:null, paused:false, offline:true, name:''}; cb&&cb(); return; }
    NET.getGate('', g=>{
      if(g && g.ok!==false){
        GATE={ paced:!!g.paced, paused:!!g.paused,
               open: Array.isArray(g.open)?g.open:null,
               l1open: Array.isArray(g.l1open)?g.l1open:null,
               name: g.name||'', offline:false };
        if(g.name) S.class.name=g.name;
      } else if(!GATE.offline===false || GATE.paced===undefined){
        GATE={paced:false, open:null, l1open:null, paused:false, offline:true, name:''};
      }
      cb&&cb();
    });
  },

  renderWaiting(reason){
    this._stopGatePoll();
    const ai=this.actIndexOfStage(S.stage);
    const host=document.getElementById('stage');
    const isReconn = reason==='reconnecting';
    const title = isReconn ? 'Reconnecting to your class' : (GATE.paused?'The class is on hold':'Waiting for the next act');
    const body = isReconn
      ? 'This device lost the classroom server. This will retry automatically. Your progress is saved. If this stays down for more than a minute, tell your teacher, and check that you are on the college network.'
      : (GATE.paused
          ? 'Your instructor has paused the game for everyone. It will pick up right here when they resume. Your progress is saved.'
          : 'You\u2019ve reached <b>'+MAP[ai].act.replace(/ ·.*/,'')+'</b>. Your instructor opens each act for the whole class together, so you\u2019re waiting for the rest of the room to catch up. Your progress is saved.');
    host.innerHTML=`
      <div class="panel" style="text-align:center">
        <div class="eyebrow">${isReconn?'Network':'Paced by your instructor'}</div>
        <h2 style="margin:8px 0 10px">${title}</h2>
        <p class="muted" style="font-size:14.5px;max-width:440px;margin:0 auto">${body}</p>
        <div class="row" style="justify-content:center;margin-top:18px"><button class="primary" onclick="F.checkGate()">Check now</button></div>
        <p class="faint" style="font-size:12px;margin-top:10px">Checking automatically every few seconds.</p>
      </div>`;
    this.renderStat(); this.renderRail();
    this._startGatePoll();
  },

  checkGate(){ this.refreshGate(()=>this.render()); },

  _startGatePoll(){
    if(GATE_POLL || !NET.online()) return;
    const tick=()=>{ GATE_POLL=setTimeout(()=>{
      this.refreshGate(()=>{
        if(GATE.paced && (GATE.paused || (Array.isArray(GATE.l1open) && GATE.l1open.indexOf(S.stage)<0))){ GATE_POLL=null; tick(); }
        else { GATE_POLL=null; this.render(); }
      });
    }, 12000 + Math.floor(Math.random()*8000)); }; // 12-20s jitter so 70 clients don't sync
    tick();
  },
  _stopGatePoll(){ if(GATE_POLL){ clearTimeout(GATE_POLL); GATE_POLL=null; } },

  actComplete(){
    return `<div class="panel">
      <div class="eyebrow">The journey is complete</div>
      <h2 style="margin-bottom:10px">From scarcity to a market leader</h2>
      <p class="muted" style="font-size:14px">You built a firm from a single unmet need and ran it through real competition. Here is every concept you applied, in the order a founder actually meets them.</p>
      <table><thead><tr><th>Concept</th><th>Your choice</th></tr></thead><tbody>
        ${S.log.map(l=>`<tr><td>${l.concept}</td><td>${l.choice}</td></tr>`).join('')}
      </tbody></table>
      <div class="reinforce" style="margin-top:16px"><div class="tag">The whole arc</div>
        <p>Scarcity created the market and forced an opportunity-cost choice. Financing set your hurdle rate, which decided your capital budget. Demand drew the ceiling, costs drew the floor, and where marginal revenue met marginal cost set your price. Then rivals arrived and competed that price toward marginal cost, exactly as the market-structure spectrum predicted.</p>
        <div class="key">Every number on every screen came from a formula you could see. That is the difference between learning economics and trusting a black box.</div>
        <div class="toolkit" style="margin-top:8px">${S.toolkit.map(c=>`<span class="chip">✓ ${c}</span>`).join('')}</div></div>
      <div class="row" style="margin-top:14px"><button class="ghost" onclick="F.reset()">Play again from scarcity</button></div>
    </div>`;
  },

  boot(){
    const s=this.load(); if(s&&s._build===BUILD){S=s;} else {S=fresh();}
    // Read classroom identity written by the Hub (survives refresh, applies to all phases)
    try{ const raw=localStorage.getItem('econventure_class_v1');
         if(raw){ const cls=JSON.parse(raw)||{};
           if(cls.code){ S.class={code:cls.code, sid:cls.sid||'', name:cls.name||'', uid:cls.uid||'', google:cls.google||null}; if(!S.student) S.student={}; if(cls.name) S.student.name=cls.name; if(cls.roll) S.student.id=cls.roll; S.student.section=cls.code; } } }catch(e){}
    // Honor a "goto concept" directive dropped by another file (e.g. from L2 acts).
    try{ const raw2=localStorage.getItem('econventure_pending_goto');
         if(raw2){ const d=JSON.parse(raw2); localStorage.removeItem('econventure_pending_goto');
           if(d && d.posKind==='concept' && typeof d.pos==='number'){ S.phase='play'; S.stage=Math.max(0,Math.min(TOTAL_IMPLEMENTED-1, d.pos));
             // Ensure the opening/closing quiz gates DO NOT block a teacher-driven jump: mark the destination's opening done.
             S.cQ.doneOpen[S.stage]=1; S.cQ.phase=''; S.cQ.qIdx=0; } } }catch(e){}
    try{localStorage.setItem('_t','1');localStorage.removeItem('_t');}catch(e){S._nostore=true;}
    this.refreshGate(()=>this.render());
    try{ setInterval(()=>{ try{ NET.ping(S.phase==='play'?('L1:'+S.stage):S.phase); }catch(e){} },20000); }catch(e){}
    try{ setInterval(()=>{ try{ NET.cloudSave(); }catch(e){} },30000); }catch(e){}
    try{ window.addEventListener('beforeunload', ()=>{ try{ NET.cloudSave(); }catch(e){} }); }catch(e){}
    /* initial push after 1s so the boot state (post-directive-apply) is captured */
    try{ setTimeout(()=>{ try{ NET.cloudSave(); }catch(e){} },1000); }catch(e){}
  },
  applyDirective(d){
    if(!d || !d.kind) return;
    if(d.kind==='kick'){
      try{ localStorage.removeItem('econventure_class_v1'); }catch(e){}
      alert('Your teacher has removed you from this class. You will be returned to the Hub.');
      try{ location.href='EconVenture_Hub.html'; }catch(e){}
      return;
    }
    if(d.kind==='goto'){
      if(d.posKind==='concept'){
        const target=Math.max(0,Math.min(TOTAL_IMPLEMENTED-1,Number(d.pos)||0));
        S.phase='play'; S.stage=target;
        S.cQ.doneOpen[target]=1; S.cQ.phase=''; S.cQ.qIdx=0;
        this.save(); this.refreshGate(()=>this.render());
        return;
      }
      if(d.posKind==='act'){
        // Not this file: leave to the Hub / target act to navigate.
        const files=['EconVenture_L1_Aggregation.html','EconVenture_Founder.html','EconVenture_L2_Act1.html','EconVenture_L2_Act2.html','EconVenture_L2_Act3.html','EconVenture_L2_Act4.html','EconVenture_L2_Act5.html','EconVenture_L2_Act6.html','EconVenture_L2_Act7.html','EconVenture_L2_Act8.html','EconVenture_Live.html'];
        const tgt=Number(d.pos)||0;
        if(files[tgt] && tgt!==1){ try{ location.href=files[tgt]; }catch(e){} }
        // if tgt is 1, that IS the Founder file — no navigation needed
      }
    }
  }
};

/* ---- concept-level opening + closing quizzes: gate every one of the 16 concepts ---- */
F.renderConceptQuiz=function(which){
  const cIdx=S.stage, bundle=CQUIZ[cIdx]; if(!bundle){ S.cQ.phase=''; return this.render(); }
  const items = which==='open' ? [bundle.open] : bundle.close;
  const idx=S.cQ.qIdx, item=items[idx], total=items.length;
  const conceptName=(STAGES[cIdx]&&STAGES[cIdx].concept)||('Concept '+(cIdx+1));
  const label = which==='open'
    ? 'Before we start \u00b7 <b>'+conceptName+'</b>'
    : 'What did you take away? \u00b7 <b>'+conceptName+'</b>';
  const opts=item.opts.map((o,i)=>'<div class="opt" onclick="F.answerConceptQuiz('+i+')"><div class="lab">'+o+'</div></div>').join('');
  document.getElementById('stage').innerHTML=
    '<div class="panel">'+
      '<div class="eyebrow">'+label+' \u00b7 question '+(idx+1)+' of '+total+'</div>'+
      '<div class="qprog"><div style="width:'+((idx/total)*100)+'%"></div></div>'+
      '<h2 style="margin-bottom:16px">'+item.q+'</h2>'+
      '<div class="opts">'+opts+'</div>'+
      '<p class="faint" style="font-size:11.5px;margin-top:12px">'+
        (which==='open'?'One quick check, then the concept opens.':'Two closing questions, then the next concept unlocks.')+
      '</p>'+
    '</div>';
};
F.answerConceptQuiz=function(i){
  const cIdx=S.stage, bundle=CQUIZ[cIdx]; if(!bundle){ return; }
  if(S.cQ.phase==='cOpen'){
    const ok = i===bundle.open.a ? 1 : 0;
    S.cQ.openScore=ok; S.cQ.doneOpen[cIdx]=1; S.cQ.phase=''; S.cQ.qIdx=0;
    this.save(); try{ NET.logQuiz(cIdx,'pre',ok,1); }catch(e){}
    this.render(); window.scrollTo(0,0); return;
  }
  if(S.cQ.phase==='cClose'){
    S.cQ.closeAns.push(i);
    if(S.cQ.qIdx<bundle.close.length-1){ S.cQ.qIdx++; this.save(); this.render(); return; }
    const score=S.cQ.closeAns.reduce((s,a,k)=>s+(a===bundle.close[k].a?1:0),0);
    try{ NET.logQuiz(cIdx,'post',score,bundle.close.length); }catch(e){}
    S.cQ.doneClose[cIdx]=1; S.cQ.phase=''; S.cQ.qIdx=0; S.cQ.closeAns=[];
    S.stage++;
    this.save(); this.refreshGate(()=>{ this.render(); window.scrollTo(0,0); });
    try{ NET.ping('L1:'+S.stage); }catch(e){}
    return;
  }
};

F.answerQuiz=function(i){
  const which=S.phase, arr= which==='pre'?S.preAns:S.postAns;
  arr.push(i); S.qIdx++;
  if(S.qIdx>=QUIZ.length){
    const score=arr.reduce((s,a,k)=>s+(a===QUIZ[k].a?1:0),0);
    if(which==='pre'){ S.preScore=score; S.phase='play'; S.stage=0; this.save(); this.refreshGate(()=>{ this.render(); window.scrollTo(0,0); }); return; }
    else { S.postScore=score; S.phase='report'; }
    this.save(); this.render(); window.scrollTo(0,0); return;
  }
  this.save(); this.render();
};

F.completionCode=function(){
  const st=S.student||{};
  const init=(st.name||'XX').split(/\s+/).map(w=>(w[0]||'')).join('').toUpperCase().slice(0,3)||'XX';
  const idTail=(st.id||'').replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(-6)||'000000';
  let rank=0,n=0,profK=0;
  const run=S.run;
  if(run&&run.history&&run.history.length){ const ranked=[...run.firms].sort((a,b)=>b.cash-a.cash); rank=ranked.findIndex(f=>f.id==='you')+1; n=run.firms.length; profK=Math.round(run.history.reduce((s,h)=>s+h.profit,0)/1000); }
  const core=`${init}-${idTail}-P${S.preScore||0}Q${S.postScore||0}-C${S.toolkit.length}-R${rank}of${n}-${profK}k`;
  let h=0; for(const ch of core) h=(h*31+ch.charCodeAt(0))%46656;
  return `EV${BUILD}-${core}-${h.toString(36).toUpperCase().padStart(3,'0')}`;
};

    runRank:rank, runField:n, tourScore:(S.tourScore==null?'':S.tourScore), code:this.completionCode() };

F.loadLeaderboard=function(){

  });
};

      </div>
    </div>`;
  this.renderStat(); this.renderRail(); this.loadLeaderboard();
};

F.backToReport=function(){ S.phase='report'; this.save(); this.render(); window.scrollTo(0,0); };

window.addEventListener('DOMContentLoaded',()=>F.boot());
</script>
