<body>
<div class="wrap">

    <div class="step">Act 3 · Good, better, best</div><a class="hublink" href="EconVenture_Hub.html" title="Back to hub">◄ Hub</a></div>

<script>
/* EconVenture classroom helper — must be identical across every act.
   Enforces the faculty gate for THIS act (network required; fail-closed after a grace period)
   and reports position + completion to the classroom backend. */
const CLASS_URL='';  /* faculty pastes the same Apps Script /exec URL used by Hub/Founder */
const CLS={
  cfg:{ actIdx:-1, actKind:'act', graceMs:15000, pollMs:6000, pingMs:20000 },
  state:{ code:'', sid:'', name:'', gate:null, lastOk:0, tries:0, active:false },
  init(){ try{ const r=localStorage.getItem('econventure_class_v1'); if(r){ const c=JSON.parse(r)||{}; this.state.code=c.code||''; this.state.sid=c.sid||''; this.state.name=c.name||''; } }catch(e){} },
  online(){ return !!(CLASS_URL||'').trim(); },
  call(params, cb){
    if(!this.online()){ cb&&cb(null); return; }
    try{
      const qs=Object.keys(params).map(k=>k+'='+encodeURIComponent(params[k])).join('&');
      fetch((CLASS_URL||'').trim()+'?api=1&'+qs,{cache:'no-store'})
        .then(r=>r.json()).then(j=>cb&&cb(j))
        .catch(()=>cb&&cb(null));
    }catch(e){ cb&&cb(null); }
  },
  isOpenForMe(){
    const g=this.state.gate; if(!g) return false;
    if(g.paused) return false;
    if(!g.paced) return true;                     // teacher turned pacing off => everyone can proceed
    if(this.cfg.actKind==='act'){
      return Array.isArray(g.open) && g.open.indexOf(this.cfg.actIdx)>=0;
    }
    return Array.isArray(g.l1open) && g.l1open.indexOf(this.cfg.actIdx)>=0;
  },
  showGate(msg, sub){
    if(this._gateEl){ this._gateEl.remove(); this._gateEl=null; }
    const el=document.createElement('div');
    el.id='__cls_gate';
    el.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(8,19,33,.97);display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(6px);font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif;color:#eef4fb';
    el.innerHTML='<div style="max-width:520px;text-align:center;padding:28px 32px;background:linear-gradient(180deg,#0d1f38,#0b1d38);border:1px solid #1d3a5f;border-radius:16px;box-shadow:0 22px 44px -18px rgba(0,0,0,.7)">'+
      '<div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#93abcd;margin-bottom:8px">Paced by your teacher</div>'+
      '<div style="font-size:22px;font-weight:700;margin-bottom:10px">'+msg+'</div>'+
      '<div style="font-size:14px;color:#93abcd">'+sub+'</div>'+
      '</div>';
    document.body.appendChild(el); this._gateEl=el;
  },
  hideGate(){ if(this._gateEl){ this._gateEl.remove(); this._gateEl=null; } },
  refreshGate(cb){
    if(!this.state.code){ this.showGate('Sign in through the Hub first', 'This act only opens when you are joined to your teacher\u2019s classroom. Return to the Hub, enter your name, roll and the class code, then come back.'); cb&&cb(false); return; }
    if(!this.online()){ this.showGate('This game is not connected to a class', 'The classroom server is not configured on this page. Ask your teacher.'); cb&&cb(false); return; }
    this.call({action:'gate',code:this.state.code}, g=>{
      this.state.tries++;
      if(g && g.ok!==false){
        this.state.gate=g; this.state.lastOk=Date.now(); this.state.tries=0;
        if(this.isOpenForMe()){ this.hideGate(); cb&&cb(true); }
        else {
          const name=(g.name||this.state.code);
          this.showGate(g.paused?('Class '+name+' is on hold'):('Waiting for your teacher to open this stage'), g.paused?'Your teacher paused the class. You will unlock when they resume.':'You are ahead of the class, or your teacher has not opened this stage yet. It will open automatically the moment they do.');
          cb&&cb(false);
        }
      } else {
        const age=Date.now()-this.state.lastOk;
        if(this.state.lastOk && age<this.cfg.graceMs){ /* recent good state, no scary UI */ cb&&cb(this.isOpenForMe()); }
        else { this.showGate('Reconnecting to your class', 'Your device lost the classroom server. This will retry automatically. If it stays down for a minute, tell your teacher.'); cb&&cb(false); }
      }
    });
  },
  start(actIdx, actKind){
    this.cfg.actIdx=actIdx; this.cfg.actKind=actKind||'act';
    this.init();
    if(this.state.active) return; this.state.active=true;
    this.refreshGate();
    this._poll=setInterval(()=>this.refreshGate(),this.cfg.pollMs);
    this._ping=setInterval(()=>{ this._doPing(); },this.cfg.pingMs);
    this._doPing();  /* immediate so roster shows position instantly */
    if(this._initCloudSave) this._initCloudSave();
  },
  _doPing(){
    if(!this.state.code || !this.state.sid) return;
    this.call({action:'ping',sid:this.state.sid,pos:(this.cfg.actKind==='act'?'A:':'L1:')+this.cfg.actIdx}, r=>{
      if(!r || !r.directive) return;
      this._handleDirective(r.directive);
    });
  },
  _handleDirective(d){
    if(!d || !d.kind) return;
    if(d.kind==='kick'){
      try{ localStorage.removeItem('econventure_class_v1'); }catch(e){}
      this.showGate('You have been removed from this class', 'Your teacher removed you from the classroom. Return to the Hub if you want to rejoin with a new code.');
      return;
    }
    if(d.kind==='goto'){
      const kind = d.posKind==='act'?'act':'concept';
      const pos = Number(d.pos)||0;
      // If the target IS this file's own act at same kind, just clear the gate wall (they're already here).
      if(kind==='act' && this.cfg.actKind==='act' && pos===this.cfg.actIdx){ this.hideGate(); return; }
      // Otherwise navigate to the Hub target file. Same-directory relative link.
      const files = ['EconVenture_L1_Aggregation.html','EconVenture_Founder.html','EconVenture_L2_Act1.html','EconVenture_L2_Act2.html','EconVenture_L2_Act3.html','EconVenture_L2_Act4.html','EconVenture_L2_Act5.html','EconVenture_L2_Act6.html','EconVenture_L2_Act7.html','EconVenture_L2_Act8.html','EconVenture_Live.html'];
      if(kind==='act' && files[pos]){
        try{ location.href=files[pos]; }catch(e){}
        return;
      }
      if(kind==='concept'){
        // Send them into Founder at that concept. Founder reads its own directive on boot.
        try{ localStorage.setItem('econventure_pending_goto', JSON.stringify({posKind:'concept',pos:pos,at:Date.now()})); }catch(e){}
        try{ location.href='EconVenture_Founder.html'; }catch(e){}
      }
    }
  },
  complete(){ if(!this.state.code || !this.state.sid) return;
    this.call({action:'quiz',code:this.state.code,sid:this.state.sid,concept:100+this.cfg.actIdx,phase:'post',score:1,total:1},()=>{}); },
  needsClassroom(){ return !this.state.code; }
};

/* Cloud save: bundle every econventure_* localStorage key, ship on change (debounced).
   Called by CLS.start automatically once we have code + uid. Fetch on Hub finish (Hub side). */
CLS._saveKey='econventure_cloudsave_lasthash';
CLS._collectBundle=function(){
  const bundle={};
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(!k) continue;
      if(k.indexOf('econventure_')!==0) continue;
      if(k==='econventure_cloudsave_lasthash') continue;    /* housekeeping key: don't ship */
      bundle[k]=localStorage.getItem(k);
    }
  }catch(e){}
  return bundle;
};
CLS._hash=function(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return String(h); };
CLS._pushSave=function(force){
  if(!this.state.code || !this.state.uid) return;
  const bundle=this._collectBundle();
  const payload=JSON.stringify(bundle);
  const hash=this._hash(payload);
  if(!force){
    try{ if(localStorage.getItem(this._saveKey)===hash) return; }catch(e){}
  }
  this.call({action:'save',code:this.state.code,uid:this.state.uid,gsub:this.state.gsub||'',email:this.state.email||'',name:this.state.name||'',roll:this.state.roll||'',payload:payload}, r=>{
    if(r && r.ok){ try{ localStorage.setItem(this._saveKey, hash); }catch(e){} }
  });
};
CLS._initCloudSave=function(){
  /* Re-read identity to include uid/gsub/email if the Hub wrote them. */
  try{
    const raw=localStorage.getItem('econventure_class_v1');
    if(raw){ const c=JSON.parse(raw)||{};
      this.state.code=c.code||this.state.code;
      this.state.sid=c.sid||this.state.sid;
      this.state.name=c.name||this.state.name;
      this.state.uid=c.uid||'';
      if(c.google){ this.state.gsub=c.google.sub||''; this.state.email=c.google.email||''; }
      if(c.roll) this.state.roll=c.roll;
    }
  }catch(e){}
  if(!this._cloudInited && this.state.code && this.state.uid){
    this._cloudInited=true;
    /* First push after 1s (gives boot code a moment to settle), then every 30s if changed, then on unload. */
    setTimeout(()=>this._pushSave(false), 1000);
    setInterval(()=>this._pushSave(false), 30000);
    window.addEventListener('beforeunload', ()=>{ try{ this._pushSave(true); }catch(e){} });
  }
};


/* ============================================================================
   LEVEL 2 · ACT 3 — versioning (second-degree price discrimination).
   In Act 2 the firm sorted buyers itself (it could tell households from
   businesses). Here it CANNOT identify buyers, so it offers three tiers and
   lets buyers sort themselves by which one they choose.

   Three buyer segments, each with a willingness to pay (WTP) for each tier.
   A buyer picks the tier with the most surplus (WTP - price), or nothing.
     Budget     (3500): basic 95 / mid 120 / premium 140
     Mainstream (3000): basic 110/ mid 200 / premium 235
     Pro        (2000): basic 120/ mid 230 / premium 360
   Unit cost rises with quality: basic 55, mid 100, premium 165, fixed 100000.
   Verified: profit-max prices basic 94 / mid 184 / premium 314 -> profit ~587k,
   which sits in the ladder above Act 2 (471k) and below the first-degree
   ceiling (700k). Clean separation, and cannibalization when mispriced.
   ============================================================================ */
const SEG=[
  {name:'Budget',    size:3500, intend:'basic',   wtp:{basic:95, mid:120, premium:140}},
  {name:'Mainstream',size:3000, intend:'mid',     wtp:{basic:110,mid:200, premium:235}},
  {name:'Pro',       size:2000, intend:'premium', wtp:{basic:120,mid:230, premium:360}}
];
const TIER={basic:{name:'Basic',q:'★',cost:55,color:'#6f97c4'},
            mid:{name:'Mid',q:'★★',cost:100,color:'#4a90d9'},
            premium:{name:'Premium',q:'★★★',cost:165,color:'#e0b54a'}};
const FC=100000, SINGLE_ACT1=373000, TWOSEG_ACT2=471000, CEILING=700000;
const OPT={pB:94,pM:184,pP:314,profit:586500};
const SINGLE_TIER=395000; // best single (mid-only) product

function pick(seg,pr){
  const s={basic:seg.wtp.basic-pr.basic, mid:seg.wtp.mid-pr.mid, premium:seg.wtp.premium-pr.premium};
  const best=Math.max(0,s.basic,s.mid,s.premium);
  let tier='none';
  if(best>0){ if(best===s.premium)tier='premium'; else if(best===s.mid)tier='mid'; else tier='basic'; }
  return {tier,s};
}
function run(pr){
  let units={basic:0,mid:0,premium:0}, picks={};
  SEG.forEach(seg=>{const p=pick(seg,pr); picks[seg.name]=p.tier; if(p.tier!=='none') units[p.tier]+=seg.size;});
  let profit=-FC;
  for(const t of ['basic','mid','premium']) profit+=units[t]*(pr[t]-TIER[t].cost);
  return {units,picks,profit:Math.round(profit)};
}
const inr=n=>{n=Math.round(n||0);const neg=n<0;n=Math.abs(n);return (neg?'-₹':'₹')+n.toLocaleString('en-IN');};
const k=n=>(n<0?'-':'')+'₹'+Math.round(Math.abs(n)/1000)+'k';

/* ---- buyer-flow diagram: segments (left) sort into tiers (right) --------- */
function flowSVG(pr){
  const r=run(pr), W=380,H=250, segX=18, tierX=232, boxW=128, boxH=54, gap=14;
  const segY=i=>14+i*(boxH+gap), tierY=i=>14+i*(boxH+gap);
  const tierIndex={basic:0,mid:1,premium:2};
  let out='';
  // connectors first
  SEG.forEach((seg,i)=>{
    const tier=r.picks[seg.name];
    if(tier==='none'){
      out+=`<text x="${segX+boxW+8}" y="${segY(i)+boxH/2+4}" font-size="10" fill="var(--muted)">buys nothing</text>`; return;
    }
    const y1=segY(i)+boxH/2, y2=tierY(tierIndex[tier])+boxH/2, x1=segX+boxW, x2=tierX;
    const good=(tier===seg.intend);
    const col=good?'#43b581':'#e5594d';
    const mx=(x1+x2)/2;
    out+=`<path d="M${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="${good?2.5:3}" opacity="${good?.8:1}" ${good?'':'stroke-dasharray="1 0"'}/>`;
    if(!good) out+=`<text x="${mx}" y="${(y1+y2)/2-4}" text-anchor="middle" font-size="9" font-weight="700" fill="#e5594d">cannibalized</text>`;
  });
  // segment boxes
  SEG.forEach((seg,i)=>{
    out+=`<rect x="${segX}" y="${segY(i)}" width="${boxW}" height="${boxH}" rx="9" fill="#0a1c33" stroke="var(--line)"/>
      <text x="${segX+11}" y="${segY(i)+21}" font-size="12.5" font-weight="700" fill="#dbe6f5">${seg.name}</text>
      <text x="${segX+11}" y="${segY(i)+39}" font-size="10.5" fill="var(--muted)">${seg.size.toLocaleString('en-IN')} buyers</text>`;
  });
  // tier boxes
  ['basic','mid','premium'].forEach((t,i)=>{
    const T=TIER[t];
    out+=`<rect x="${tierX}" y="${tierY(i)}" width="${boxW}" height="${boxH}" rx="9" fill="#0a1c33" stroke="${T.color}"/>
      <text x="${tierX+11}" y="${tierY(i)+20}" font-size="12.5" font-weight="700" fill="${T.color}">${T.name} · ${inr(pr[t])}</text>
      <text x="${tierX+11}" y="${tierY(i)+38}" font-size="10.5" fill="var(--muted)">${r.units[t].toLocaleString('en-IN')} sold</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}">${out}</svg>`;
}

/* ------------------------------- PRIMER --------------------------------- */
function primer(){
  return `<div class="panel">
    <div class="step" style="margin-bottom:4px">Before we start · connect the idea</div>
    <h1>You can't put a label on a customer. So make them label themselves.</h1>
    <p class="muted">Quick recap of where you are. Act 1 showed that at any single price, buyers who would have paid more keep the difference as consumer surplus, money you leave on the table. Act 2 let you take some of it back by charging two groups different prices, because you could tell households from businesses at the counter.</p>
    <div class="speak"><span class="who">Priya:</span> "But here is the catch that breaks Act 2 in the real world. Walk into your own shop. Can you look at a customer and know if they are a penny-pincher or someone who will happily pay double for the best? You cannot. Nobody wears a sign. So you cannot sort them yourself anymore."</div>
    <p class="small">The fix is everywhere around you. You have already lived it a hundred times:</p>
    <div class="example">
      <div class="ex"><b>Coffee shop</b><br>Small, medium, large. Same coffee, three prices. You pick your own size, and the shop never had to ask your budget.</div>
      <div class="ex"><b>Airlines</b><br>Economy, business, first. The person who values comfort books business and pays for it. They sorted themselves.</div>
      <div class="ex"><b>Software / phones</b><br>Basic, Pro, Max. The power user reaches for Max without being told to.</div>
    </div>
    <p class="small">That is the whole trick of this act. You build a <b>ladder of three versions</b>, basic, mid, premium, of the same core product, and set a price for each. Then you let buyers <b>sort themselves</b> by which rung they climb to. Price the ladder well and each type of buyer walks into the tier you built for them, paying close to what they are willing to pay. Price it badly and your own cheap tier steals the buyers who should have paid for premium. That self-sabotage has a name, <b>cannibalization</b>, and avoiding it is the real skill here.</p>
    <p class="small muted">One thing to hold onto: this is still price discrimination, the same goal as Act 2, capturing that blue surplus. The difference is <i>who does the sorting</i>. In Act 2 you sorted buyers. Here buyers sort themselves. Economists call it second-degree price discrimination, or just versioning.</p>
    <div class="btnrow"><button class="btn primary wide" id="go">Design your product ladder →</button></div>
  </div>`;
}

/* ------------------------------- PLAY ----------------------------------- */
function play(){
  const r=run(prices());
  const clean=r.picks.Budget==='basic'&&r.picks.Mainstream==='mid'&&r.picks.Pro==='premium';
  const tierCard=(t,key,min,max)=>{const T=TIER[t];return `<div class="tier ${key}">
    <h3 style="color:${T.color}">${T.name}</h3><div class="q">${T.q}</div>
    <div class="tiny muted" style="margin:4px 0">unit cost ${inr(T.cost)}</div>
    <label class="field"><div class="cap"><b>Price</b> <span class="val" id="${t}Val">${inr(ST['p'+(t==='basic'?'B':t==='mid'?'M':'P')])}</span></div>
      <input id="pr_${t}" type="range" min="${min}" max="${max}" step="1" value="${ST['p'+(t==='basic'?'B':t==='mid'?'M':'P')]}" style="--tint:${T.color}"></label>
    <div class="tiny mono" id="${t}Sold">${r.units[t].toLocaleString('en-IN')} sold · margin ${inr(ST['p'+(t==='basic'?'B':t==='mid'?'M':'P')]-T.cost)}</div></div>`;};
  return `<div class="panel">
    <div class="step" style="margin-bottom:4px">Design the ladder</div>
    <h2>Set three prices. Watch buyers sort themselves.</h2>
    <p class="small muted" style="margin-top:0">Quality is fixed for each tier (that is your product design). Your only levers here are the three prices. Green lines mean a buyer group chose the tier you built for it. Red means a group defected to a cheaper tier, that is cannibalization eating your profit.</p>
    <div class="grid cols2">
      <div id="flowbox">${flowSVG(prices())}</div>
      <div>
        <div class="grid cols3" style="margin-bottom:4px">
          <div class="card"><div class="l">Total profit</div><div class="v mono" id="profV" style="color:${r.profit>=TWOSEG_ACT2?'var(--good)':'var(--ink)'}">${inr(r.profit)}</div></div>
          <div class="card"><div class="l">Act 2 result</div><div class="v mono">${inr(TWOSEG_ACT2)}</div></div>
          <div class="card"><div class="l">Separation</div><div class="v" id="sepV" style="font-size:15px;color:${clean?'var(--good)':'var(--bad)'}">${clean?'clean':'broken'}</div></div>
        </div>
        <div id="alarm"></div>
      </div>
    </div>
    <div class="grid cols3" style="margin-top:6px">
      ${tierCard('basic','basic',55,160)}
      ${tierCard('mid','mid',100,240)}
      ${tierCard('premium','prem',165,380)}
    </div>
    <div class="work" id="work">${workText()}</div>
    <div class="hint">Try pushing the <b>premium</b> price up past ₹314 and watch your Pro buyers. They do not vanish, they drop down into your mid tier. That is your own ladder eating itself.</div>
    <div class="btnrow"><button class="btn primary wide" id="lock">Lock in the ladder</button></div>
    <div id="after"></div>
  </div>`;
}
function workText(){
  const pr=prices();
  const rows=SEG.map(seg=>{
    const p=pick(seg,pr);
    const parts=['basic','mid','premium'].map(t=>{const su=seg.wtp[t]-pr[t];
      return `${TIER[t].name} ${su>=0?'+':''}${su}`;});
    const label=p.tier==='none'?'buys nothing':`picks <b>${TIER[p.tier].name}</b>`;
    return `<div class="row"><b style="color:#cfe0f5">${seg.name}</b> surplus → ${parts.join(' · ')} → ${label}</div>`;
  }).join('');
  return rows+`<div class="row" style="border-top:1px solid var(--line);margin-top:6px;padding-top:6px">Each group picks the tier with the largest positive surplus (willingness to pay minus price). That single rule is self-selection.</div>`;
}

function afterLock(){
  const r=run(prices()), clean=r.picks.Budget==='basic'&&r.picks.Mainstream==='mid'&&r.picks.Pro==='premium';
  const near=Math.abs(r.profit-OPT.profit)<25000 && clean;
  let head;
  if(near){
    head=`<div class="flag ok"><b>That is a well-designed ladder.</b> Near ₹${(OPT.profit/1000).toFixed(0)}k, each group in its own tier, and you beat both the single price from Act 1 and the two-segment result from Act 2. The premium price sits just under where Pro buyers would defect to mid, extracting the most from them without losing them.</div>`;
  } else if(!clean){
    const defector=SEG.find(s=>r.picks[s.name]!==s.intend);
    head=`<div class="flag bad"><b>Cannibalization.</b> Your <b>${defector?defector.name:'a'}</b> group did not land in the tier you built for it. When a higher-value buyer slips into a cheaper tier, you lose the fat margin they would have paid. Fix the price gaps so each group's best surplus is in its own tier, then push for profit.</div>`;
  } else {
    head=`<div class="flag info">Clean separation, but you are leaving margin behind at ₹${(r.profit/1000).toFixed(0)}k. The peak is near basic ₹94, mid ₹184, premium ₹314. Raise prices toward each group's willingness to pay, but stop just before a group defects downward.</div>`;
  }
  return head+`<div class="reinforce">
    <div class="chip" style="margin-bottom:6px">Second-degree price discrimination (versioning)</div>
    <h3>Let the menu do the sorting</h3>
    <p class="small" style="margin:.2em 0 0">You could not tell your buyers apart, so you built a ladder and let them reveal themselves by what they picked. That is <b>versioning</b>, or second-degree price discrimination. It works through <b>self-selection</b>: each price is set so that the group you want in a tier gets more surplus there than anywhere else. Economists call that condition <b>incentive compatibility</b>. The premium price is capped not by cost but by your own mid tier: push it too high and your best customers are happier buying mid, so you lose them. That downward pull is <b>cannibalization</b>, and the whole art is pricing the gaps so it never happens.</p>
    <p class="small" style="margin:.6em 0 0">Notice where this sits versus Act 2. Third-degree discrimination needed you to identify groups and block resale. Versioning needs neither, which is why it is everywhere in the real world, from coffee cups to airline cabins. It captures a little less than perfectly identifying everyone, but it is achievable, and here it still beat the single price by a wide margin.</p>
    <div class="chips"><span class="chip">Second-degree discrimination</span><span class="chip">Self-selection</span><span class="chip">Incentive compatibility</span><span class="chip">Cannibalization</span><span class="chip">Product line design</span></div>
  </div>
  <div class="reinforce" style="border-left-color:var(--gold)">
    <div class="chip" style="margin-bottom:6px">What comes next</div>
    <h3>Now the ground starts moving</h3>
    <p class="small" style="margin:.2em 0 0">So far your three buyer groups sat still. Act 4 turns on the economy. In a boom, Pro buyers multiply and premium flies off the shelf, a luxury with high income elasticity. In a recession, buyers trade down and your basic tier carries the company. Your ladder is tuned for today; Act 4 asks you to rotate it as incomes rise and fall, and to watch how a rival's price on one tier bleeds into demand for another. That is income elasticity and cross-price elasticity, live.</p>
  </div>
  <div class="btnrow"><button class="btn primary" id="nextAct">Continue · Act 4 · Cost of production →</button><button class="btn ghost" id="replay">Adjust the ladder again</button></div>`;
}

/* ------------------------------- RENDER --------------------------------- */
const setFill=el=>el&&el.style.setProperty('--fill',((el.value-el.min)/(el.max-el.min)*100)+'%');
const prefersReduced=()=>{ try{ return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){ return false; } };
// ---- smooth SVG morphing: patch geometry in place so charts glide instead of snapping ----
function _mvTok(str){ const re=/-?\d*\.?\d+(?:[eE][-+]?\d+)?/g; let m,last=0,tmpl=[],nums=[]; while((m=re.exec(str))){ tmpl.push(str.slice(last,m.index)); nums.push(parseFloat(m[0])); last=m.index+m[0].length; } tmpl.push(str.slice(last)); return {tmpl,nums}; }
function _mvBuild(tmpl,nums){ let s=tmpl[0]; for(let i=0;i<nums.length;i++){ s+=(Math.round(nums[i]*100)/100)+tmpl[i+1]; } return s; }
const _MVNUM=['cx','cy','r','rx','ry','x','y','width','height','x1','y1','x2','y2','opacity','fill-opacity','stroke-opacity','stroke-width','offset','font-size'];
function morphSVG(host,newHTML,dur){
  try{
    dur=(dur==null?120:dur);
    const cur=host.querySelector('svg'); const tmp=document.createElement('div'); tmp.innerHTML=newHTML; const nx=tmp.querySelector('svg');
    if(!cur||!nx){ host.innerHTML=newHTML; return; }
    const O=cur.querySelectorAll('*'), N=nx.querySelectorAll('*');
    if(O.length!==N.length){ cur.replaceWith(nx); return; }
    for(let i=0;i<O.length;i++){ if(O[i].tagName!==N[i].tagName){ cur.replaceWith(nx); return; } }
    const plans=[];
    for(let i=0;i<O.length;i++){ const o=O[i],n=N[i],p={o,nums:[],pts:null,d:null};
      for(const a of _MVNUM){ if(n.hasAttribute(a)){ const to=parseFloat(n.getAttribute(a)); let fr=o.hasAttribute(a)?parseFloat(o.getAttribute(a)):to; if(!isNaN(to)&&!isNaN(fr)) p.nums.push({a,fr,to}); } }
      for(const at of n.attributes){ const nm=at.name; if(_MVNUM.indexOf(nm)<0&&nm!=='points'&&nm!=='d'){ if(o.getAttribute(nm)!==at.value) o.setAttribute(nm,at.value); } }
      if(n.hasAttribute('points')){ const T=_mvTok(n.getAttribute('points')),F=_mvTok(o.getAttribute('points')||n.getAttribute('points')); if(F.nums.length===T.nums.length) p.pts={fr:F.nums,to:T.nums,tmpl:T.tmpl}; else o.setAttribute('points',n.getAttribute('points')); }
      if(n.hasAttribute('d')){ const ds=n.getAttribute('d'); const T=_mvTok(ds),F=_mvTok(o.getAttribute('d')||ds); if(F.nums.length===T.nums.length&&F.tmpl.join('\u0001')===T.tmpl.join('\u0001')) p.d={fr:F.nums,to:T.nums,tmpl:T.tmpl}; else o.setAttribute('d',ds); }
      if(n.children.length===0&&o.textContent!==n.textContent) o.textContent=n.textContent;
      plans.push(p);
    }
    if(host._mvRAF){ cancelAnimationFrame(host._mvRAF); host._mvRAF=null; }
    if(prefersReduced()||dur<=0){ for(const p of plans){ for(const x of p.nums)p.o.setAttribute(x.a,x.to); if(p.pts)p.o.setAttribute('points',_mvBuild(p.pts.tmpl,p.pts.to)); if(p.d)p.o.setAttribute('d',_mvBuild(p.d.tmpl,p.d.to)); } return; }
    const t0=performance.now();
    const step=now=>{ const k=Math.min(1,(now-t0)/dur),e=1-Math.pow(1-k,3);
      for(const p of plans){ for(const x of p.nums)p.o.setAttribute(x.a,x.fr+(x.to-x.fr)*e);
        if(p.pts){ const a=p.pts.fr,b=p.pts.to; p.o.setAttribute('points',_mvBuild(p.pts.tmpl,a.map((v,j)=>v+(b[j]-v)*e))); }
        if(p.d){ const a=p.d.fr,b=p.d.to; p.o.setAttribute('d',_mvBuild(p.d.tmpl,a.map((v,j)=>v+(b[j]-v)*e))); } }
      if(k<1) host._mvRAF=requestAnimationFrame(step);
      else { for(const p of plans){ for(const x of p.nums)p.o.setAttribute(x.a,x.to); if(p.pts)p.o.setAttribute('points',_mvBuild(p.pts.tmpl,p.pts.to)); if(p.d)p.o.setAttribute('d',_mvBuild(p.d.tmpl,p.d.to)); } host._mvRAF=null; }
    };
    host._mvRAF=requestAnimationFrame(step);
  }catch(e){ try{ host.innerHTML=newHTML; }catch(_){} }
}

function render(){
  const app=document.getElementById('app');
  if(ST.phase==='primer'){ app.innerHTML=primer(); document.getElementById('go').onclick=()=>{ST.phase='play';save();render();}; return; }
  app.innerHTML=play();
  const map={basic:'pB',mid:'pM',premium:'pP'};

  const refresh=()=>{
    ST.pB=+sliders.basic.value; ST.pM=+sliders.mid.value; ST.pP=+sliders.premium.value;
    const pr=prices(), r=run(pr), clean=r.picks.Budget==='basic'&&r.picks.Mainstream==='mid'&&r.picks.Pro==='premium';
    morphSVG(document.getElementById('flowbox'),flowSVG(pr));
    for(const t of ['basic','mid','premium']){
      const p=ST[map[t]];

    const defector=SEG.find(s=>r.picks[s.name]!==s.intend && r.picks[s.name]!=='none');

    let al='';
    if(defector) al=`<div class="flag bad">⚠ <b>${defector.name}</b> defected into <b>${TIER[r.picks[defector.name]].name}</b>. Your ladder is cannibalizing itself.</div>`;
    else if(nobody) al=`<div class="flag bad">⚠ <b>${nobody.name}</b> is priced out and buys nothing. A tier is too expensive for the group it should serve.</div>`;
    else al=`<div class="flag ok">✓ Every group landed in its own tier. Clean self-selection.</div>`;

  Object.values(sliders).forEach(setFill);

  refresh();
  document.getElementById('lock').onclick=()=>{ST.committed=true;save(); try{ CLS.completeWithQuiz(); }catch(e){}
    document.getElementById('after').innerHTML=afterLock();
    const rp=document.getElementById('replay'); if(rp) rp.onclick=()=>{document.getElementById('after').innerHTML='';};};
  if(ST.committed){document.getElementById('after').innerHTML=afterLock();
    const rp=document.getElementById('replay'); if(rp) rp.onclick=()=>{document.getElementById('after').innerHTML='';};}
}

  el.id='__cls_quiz';
  el.style.cssText='position:fixed;inset:0;z-index:99998;background:rgba(8,19,33,.97);display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(6px);font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif;color:#eef4fb';
  const opts=q.opts.map((o,i)=>'<div data-i="'+i+'" style="cursor:pointer;padding:12px 14px;border:1px solid #1d3a5f;border-radius:10px;margin-top:8px;background:#0a1830;transition:background .15s,border-color .15s" onmouseover="this.style.background=\'#0f2342\'" onmouseout="this.style.background=\'#0a1830\'">'+o+'</div>').join('');
  el.innerHTML='<div style="max-width:560px;padding:26px 30px;background:linear-gradient(180deg,#0d1f38,#0b1d38);border:1px solid #1d3a5f;border-radius:16px;box-shadow:0 22px 44px -18px rgba(0,0,0,.7)">'+
    '<div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#93abcd;margin-bottom:8px">'+(kind==='open'?'Before we start':'What did you take away')+'</div>'+
    '<div style="font-size:19px;font-weight:600;margin-bottom:6px">'+q.q+'</div>'+
    '<div id="__q_opts">'+opts+'</div>'+
    '<div style="font-size:12px;color:#5c7396;margin-top:12px">'+(kind==='open'?'One quick check, then the act opens.':'One closing question, then this act is marked complete.')+'</div>'+
    '</div>';
  document.body.appendChild(el); this._quizEl=el;
  Array.prototype.forEach.call(el.querySelectorAll('[data-i]'), function(node){
    node.onclick=function(){
      const chosen=Number(node.getAttribute('data-i'));
      const ok = chosen===q.a ? 1 : 0;
      CLS.call({action:'quiz',code:CLS.state.code,sid:CLS.state.sid,concept:200+CLS.cfg.actIdx,phase:kind==='open'?'pre':'post',score:ok,total:1},function(){});
      CLS._setQuizFlag(kind);
      if(CLS._quizEl){ CLS._quizEl.remove(); CLS._quizEl=null; }
      onDone&&onDone(ok);
    };
  });
};
/* Wrap refreshGate: when gate opens, if opening quiz not taken, show it before hiding the wall. */
CLS._origHideGate = CLS.hideGate.bind(CLS);
CLS.hideGate = function(){
  const b = (typeof window!=='undefined' && window.__L2QB) ? window.__L2QB : null;
  if(!b || CLS._loadQuizFlag('open') || !CLS.state.code){ CLS._origHideGate(); return; }
  CLS._origHideGate();
  CLS._showQuiz(b,'open', function(){});
};
/* Called by an act's lock/commit code (via CLS.completeWithQuiz) instead of CLS.complete(). */
CLS.completeWithQuiz = function(){
  const b = (typeof window!=='undefined' && window.__L2QB) ? window.__L2QB : null;
  if(!b || CLS._loadQuizFlag('close') || !CLS.state.code){ CLS.complete(); return; }
  CLS._showQuiz(b,'close', function(){ CLS.complete(); });
};

try{ CLS.start(4,'act'); }catch(e){}
</script>
